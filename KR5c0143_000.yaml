front:
  text: 文子非一
  hash: sha256:5d4009bac5044b558bbd84cef1bf171659d03879488fb3531540ee955db3eccb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0143_HFL_000-001a, image: hfl/0523/0523-004.png}
body:
  text: 文子姓辛名鈃一名計然葵丘濮上人也師事老子楚平王問曰聞子得道於老聃可得聞乎對曰道德匡邪以爲正振亂以爲治醇德復生天下安寧要在一人故積德成王積怒成亡堯舜以是昌桀紂以是殃王曰敬聞命矣後南游吴越范蠡師之越欲伐吴蠡諫曰臣聞之師曰兵凶器戰逆德爭者事之末也陰謀逆德好用凶器試身於所末不可勾踐不聽敗於夫椒後位以上大夫弗就隱吴興餘英禺山相傳以爲登雲而升按寰宇記吴興志俱載餘英東南三十里有計籌山越大夫計然嘗登此山籌度地形因名焉今山陽白石頂通玄觀乃故隱處也其紫雲關昇元觀即古常清觀宋乾道間改賜今額山之半有曰登雲石者在著文子十二篇唐封通玄眞人書爲通玄眞經通玄眞經纘義序文子者道德經之傳也老子本易而著書文子法老而立言所以發明皇帝王伯之道欲爲君者必羲軒之君爲民者皆大庭葛天之民其垂意於世亦深矣後人莫究或相詆訾今南谷杜高士探易老之賾合儒老之說每以著書立言爲心其行于世者有道德原㫖若干卷初居吴興計籌山授奇訪古得文子故居之地創白石通玄觀復得文子全書遂爲析篇章分句讀纘義附說使學者目擊道存予嘗謂乾坤開闢之後天道自北而南聖朝肇基朔方元運一轉六合爲家洪荒之世復見今日南谷應運著書以昭皇道將措斯世於華胥氏之域山林士不忘致君澤民之心誠可尚也吾教有人喜而序其端云至大三年六月旦日玄教嗣師吴全節敬書古之士用人家國必有世外隱者爲之師磨礲淬厲受其書盡其道然後功成而名立越有上將軍范蠡其師爲計然計然親見聖人於衰周懷至寳而不耀嘗究觀天道人事彊弱興廢自然之理著書十有二篇蠡用之平吴而霸越又以其緒餘全身肥家三積三散保其令名觀蠡之始終以信其師之道觀蠡屢對勾踐之言皆其師之言也其書與諸子爲道家柳子厚芟除冗駁掇取精微自爲一書頗發其意惜不傳南谷先生按圖以得計然舊居之山踞高峰之峻峙俯具區之渺瀰既爲之築室肖象復取文子作纘義融會貫通削嶮就夷發舒皇帝王伯之藴與所著玄經原㫖並行於代先生有道者其清勤儉素不爭而善勝深得柱下宗㫖立言立事見於薦紳韋布之所論著固已勒堅石而鋟華梓矣抑太史公之論陶朱謂其苦身戮力與越深謀又謂苦身戮力致產數千萬復言之不厭先生於此事異而同其功名高而不享其富則其所以得於計然之書者豈在文字章句之末去之千載眞有若合符契者焉獨恨名卿大夫知先生者多登門問道不少乃未能盡用其說如古人之謀國豈信道之未篤歟山林之士不忘斯世肉食其忘之歟不然所以尊吾老子之道者何所爲而然也余故表記范師友之所從受于篇端以俟至大庚戌仲夏廬山道士寓南眞館黄石翁序古之君天下者太上無爲其次有爲是故皇以道化帝以德教王以功勸伯以力率四者之治若四時焉天道流行固非人力之能强然則時有可行道無終否冬變而春存乎歲伯變而皇存乎君此文子作而皇道昭矣文子晋之公孫姓辛氏名鈃字計然文子其號家睢之葵丘屬宋地一稱宋鈃師老子學早聞大道著書十有二篇曰文子歸本老子之言歷陳天人之道時變之宜萃萬古於一編誠經世之樞要也楚平王聘而問道范蠡從而師之勾踐位以大夫佐越平吴功成不有退隱封禺之地登雲仙去吴興計籌之陽乃其故處唐玄宗時徵士徐靈府隱脩衡嶽注文子之書上進遂封通玄眞人號其書爲通玄眞經僕生江左身老吴邦訪文子之遺踪建白石通玄觀因獲文子故編暇日分章纘義參贊玄風若夫化教勸率道德功力之辯則不無望於世之大賢云爾後學當塗南谷子杜道堅謹序
