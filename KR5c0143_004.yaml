front:
  text: 通玄眞經纘義卷之四非四
  hash: sha256:dec3da27133e653492e822f4af39ab2942cc559abdb0b0246521a7b38077d6aa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0143_HFL_004-001a, image: hfl/0523/0523-118.png}
body:
  text: 南谷子杜道堅纂符言篇老子曰道至高無上至深無下平乎準直乎繩圓乎規方乎矩包裹天地而無表裏洞同覆蓋而無所礙是故體道者不怒不喜其坐無慮寢而不夢見物而名事至而應符以示信言以達誠世有謂符命符璽金符玉符者以能示信達誠此感彼應故曰符言夫道高下無極遐邇貫通無形無名有情有信聖人體道不私喜怒見物而名事至而應不言之言可以符信老子曰欲尸名者必生事事生即舍公而就私倍道而任己見譽而爲善立名而爲賢即治不順理而事不順時治不順理則多責事不順時即無功妄爲要中功成不足塞責事敗足以滅身名者殺身之具聖人所戒夫欲尸名者必違天悖道舍公就私要譽立名生事害衆故治不順理功不掩責事敗滅身信不誣矣老子曰無爲名尸無爲謀府無爲事任無爲智主藏於無形行於無怠不爲福先不爲禍始始於無形動於不得已欲福先無禍欲利先遠害故夫爲而寧者失其所寧即危夫爲治者失其所治則亂故不欲碌碌如玉落落如石其文好者皮必剥其角美者身必殺甘泉必竭直木必伐華榮之言後爲愆石有玉傷其山黔首之患固在言前善惡之報如影隨形作善降祥不善降殃惡不可作名可尸乎夫求爲寧者寧失即危求爲治者治失則亂皮文好而剥身角美而殺未有不由自召而至老子曰時之行動以從不知道者福爲禍天爲蓋地爲軫善用道者終無盡地爲軫天爲蓋善用道者終無害陳彼五行必有勝天之所覆無不稱故知不知上不知知病也天爲蓋無不覆地爲軫無不載天地之於人恩大無極聖人法之因時而行有動必從如彼五行相生相勝善用道者知不言知上也不知言知病矣老子曰山生金石生玉反相剥木生蟲還自食人生事還自賊夫好事者未嘗不中爭利者未嘗不窮善游者溺善騎者墮各以所好反自爲禍得在時不在爭治在道不在聖土處下不爭高故安而不危水流下不爭疾故去而不遲是以聖人無執故無失無爲故無敗天地人物更相盜而爲養盜得宜則安盜失宜則害是故食能養人亦能害人民能戴主亦能悖主夫士之立法創事以盜民力初若利之至於末流未有不自賊者也知得在時不在爭治在道不在聖則無相盜之失矣老子曰一言不可窮也二言天下宗也三言諸侯雄也四言天下雙也貞信則不可窮道德則天下宗舉賢德諸侯雄惡少愛衆天下雙言寡尤行寡悔在行不在言執大象天下往在德不在險惟口出好興戎言可不愼乎老子曰人有三死非命亡焉飲食不節簡賤其身病共殺之樂得無已好求不止刑共殺之以寡犯衆以弱凌强兵共殺之生必有死人孰免焉非命而亡良可哀也嗜欲死病利欲死刑强梁死兵夫三者所死不同非命則一老子曰其施厚者其報美其怨大者其禍深薄施而厚望畜怨而無患者未之有也察其所以往者即知其所以來矣施報之理種瓜得瓜種果得果恩怨之報理一如之老子曰原天命治心術理好憎適情性即治道通矣原天命即不惑禍福治心術即不妄喜怒理好憎即不貪無用適清性即欲不過節不惑禍福即動靜順理不妄喜怒即賞罰不阿不貪無用即不以欲害性欲不過節即養生知足凡此四者不求於外不假於人反己而得矣天命心術好憎情性四者相通如月在水虧盈圓缺隨象現影心術邪正禍福隨之老子曰不求可非之行不憎人之非己修足譽之德不求人之譽己不能使禍無至信己之不迎也不能使福必來信己之不讓也禍之至非己之所生故窮而不憂福之來非已之所成故通而不矜是故閑居而樂無爲而治信己何求非己何憎德行由己非譽由人是故譽不加勸毁不加沮居閑而樂治不以爲老子曰道者守其所已有不求其所未得求其所未得即所有者亡循其所已有即所欲者至治未固於不亂而事爲治者必危行未免於無非而急求名者必挫故福莫大於無禍利莫大於不喪故物或益之而損損之而益夫道不可以勸就利者而可以安神避害故常無禍不常有福常無罪不常有功道曰芒芒昧昧從天之威與天同氣無思慮也無設儲也來者不迎去者不將人雖東西南北獨立中央故處衆枉不失其直與天下並流不離其域不爲善不避醜遵天之道不爲始不專己循天之理不豫謀不棄時與天爲期不求得不辭福從天之則内無奇福外無奇禍故禍福不生焉有人賊故至德言同路事同福上下一心無歧道旁見者遣退之於袤開道之於善而民向方矣貪得忘失衆所同病無欲故靜斯謂至人理之在天下有不可必夫守其已有則未得或至求其未得則所有或亡是以有道者内無奇福外無奇禍與天爲徒人豈能賊之哉老子曰爲善即勸爲不善即觀勸即生貴觀即生患故道不可以進而求名可以退而修身故聖人不以行求名不以知求譽治隨自然已無所與爲者有不成求者有不得人有窮而道不通有智而無爲與無智同功有能而無事與無能同德有智若無智有能若無能道理達而人才滅矣人與道不兩明人愛名即不用道道勝人則名息道息而名章即危亡爲善不求福而福至爲惡不求禍而禍生遺臭萬世流芳千古宜有間然是故愛名重則心不用道造道深則身不求名此天人之所以分老子曰使信士分財不如定分而探籌何則有心者之於平不如無心者也使廉士守財不如閉户而全封以爲有欲者之於廉不如無欲者也人舉其疵則怨監見其醜即自善人能接物而不與己即免於累矣分財探籌有心不如無心之平守財閉户有欲不若無欲之廉舉疵則怨在彼則不愛鑑醜自善在我則愛之惟物接而無與於己者我無是心人亦無疵焉老子曰凡事人者非其寳幣必以卑辭幣單而欲不厭卑體免辭論說而交不結約束誓盟約定而反先日是以君子不外飾仁義而内修道德修其境内之事盡其地方之廣勸民守死堅其城郭上下一心與之守社稷即爲民者不伐無罪爲利者不攻難得此必全之道必利之理事人以寳幣者幣單而欲不厭結交以卑辭者辭窮而約反先惟内修道德上下一心則可以守社稷保民人其道全矣老子曰聖人不勝其心衆人不勝其欲君子行正氣小人行袤氣内便於性外合於義循理而動不繫於物者正氣也推於滋味淫於聲色發於喜怒不顧後患者袤氣也袤與正相傷欲與性相害不可兩立一起一廢故聖人損欲以從性目好色耳好聲鼻好香口好味合而說之不離利害嗜欲也耳目鼻口不知所欲皆心爲之制各得其所由此觀之欲不可勝亦明矣道心人心天理人欲之分也理勝則所爲皆天欲勝則所爲皆人此又君子小人之分矣理欲相勝邪正相傷君子不爲況聖人乎老子曰治身養性者節寢處適飲食和喜怒便動靜内在已者得而袤氣無由入飾其外傷其内扶其情者害其神見其文者蔽其眞夫須臾無忘其爲賢者必困其性百步之中無忘其爲容者必累其形故羽翼美者傷其骸骨枝葉茂者害其根荄能兩美者天下無之眞道養神人道養形在内者得在外者輕遠聲色薄滋味養形之道也絶思慮守精氣養神之道也治身養性内外兼得豈可以聲音笑貌爲哉老子曰天有明不憂民之晦也地有財不憂民之貧也至得道者若丘山塊然不動行者以爲期直己而足物不爲人賜用之者亦不受其德故安而能乆天地無與也故無奪也無德也故無怨也善怒者必多怨善與者必善奪唯隨天地之自然而能勝理故譽見即毁隨之善見即惡從之利爲害始福爲禍先不求利即無禍身以全爲常富貴其寄也聖人明照海内而民不昏富藏天下而民不貧順天地之自然任萬物之自生不私與故無公取不輕賞故無重刑視富貴如浮雲乃可以全其眞老子曰聖人無屈奇之服詭異之行服不雜行不觀通而不華窮而不懾榮而不顯隱而不辱異而不怪同用無以名之是謂大通素隱行怪君子不爲屈奇之服詭異之行豈聖人之事哉光而不耀廉而不劌與民同用而已夫是之謂大通老子曰道者直己而待命時之至不可迎而返也時之去不可追而援也故聖人不進而求不退而讓隨時三年時去我走去時三年時在我後無去無就中立其所天道無親唯德是與福之至非己之所求故不伐其功禍之來非己之所生故不悔其行中心其恬不累於德狗吠不驚自信其情誠無非分故通道者不惑知命者不憂帝王之崩藏骸於野其祭也祀之於明堂神貴於形也故神制形則從形勝神則窮聰明雖用必反諸神謂之大通道乃天下之所共由聖人直己待命時來時去不將不迎立乎中央以制四方不伐功不悔行其心恬然通道知命聰明雖用必反諸神老子曰古之存己者樂德而忘賤故名不動志樂道而忘貧故利不動心是以謙而能樂靜而能澹以數筭之壽憂天下之亂猶憂河水之涸泣而益之也故不憂天下之亂而樂其身治者可與言道矣道尊德貴悦諸心而存諸己也故不以貧賤動其心志身治則天下不足憂矣其肯以不百年之身過爲天下憂乎老子曰人有三怨爵高者人妬之官大者主惡之禄厚者人怨之夫爵益高者意益下官益大者心益小禄益厚者施益博修此三者怨不作故貴以賤爲本高以下爲基爵高志驕人必妬之官大氣豪主必惡之禄厚不施人必怨之高下相傾之道也惟謙卑好施貴不忘賤高不忘下故無怨尤老子曰言者所以通己於人也聞者所以通人於己也即闇且聾人道不通故有闇聾之病者莫知事通豈獨形骸有闇聾哉心亦有之塞也莫知所通此闇聾之類也夫道之爲宗也有形者皆生也其爲親也亦戚矣饗穀食氣者皆壽焉其爲君也亦惠矣諸智者學焉其爲師也亦明矣人皆以無用害有用故知不博而日不足以博奕之日問道聞見深矣不聞不問猶闇聾之比於人也受形而生親之恩也饗穀而壽君之惠也由學而明師之德也長而成人身亦貴矣言乃心之聲通己於人非言不達通人於已非言不聞言其神矣乎能不以私言廢公言無用害有用則聞道深而不孤上之人矣老子曰人之情心服於德不服於力德在與不在求是以聖人之欲貴於人者先貴於人欲尊於人者先尊於人欲勝人者先自勝欲卑人者先自卑故貴賤尊卑道以制之夫古之聖王以其言下人以其身後人即天下樂推而不厭戴而不重此德有餘而氣順也故知與之爲取後之爲先即幾於道矣禮貴乎先言貴乎後此人之情故可服以德不服以力是以聖人進退有度先後有節故天下樂推而戴之老子曰德少而寵多者譏才下而位高者危無大功而有厚禄者微故物或益之而損或損之而益衆人皆知利利而不知病病唯聖人知病之爲利利之爲病故再實之木其根必傷多藏之家其後必殃夫大利者反爲害天之道也德不厭廣分不可踰水淺而舟大則膠樹大而根淺則拔人之德薄才淺懷不仁而據高位鮮不拔矣惟知利病反覆無甚愛多藏得義利之和又何病焉老子曰小人從事曰苟得君子曰苟義爲善者非求名者也而名從之名不與利期而利歸之所求者同所極者異故動有益則損隨之言無常是行無常宜者小人也察於一事通於一能者中人也兼覆而並有之技能而才使之者聖人也圓顱方趾含齒戴髮均是人也禀氣有異智愚分焉小人苟得才勝德也君子苟義德勝才也可上可下則爲中人天縱多能其聖人乎老子曰生所假也死所歸也故世治即以義衛身世亂即以身衛義死之日行之終也故君子愼一用之而已矣故生所受於天也命所遭於時也有其才不遇其世天也求之有道得之在命君子能爲善不能必得其福不忍爲非而未必免於禍故君子逢時即進得之以義何幸之有不時而退讓之以禮何不幸之有故雖處貧賤而猶不悔者得其所貴也受命于天賦形爲人生有所假死有所歸所遭於時或窮或通何莫非命有其才而不遇天也是以君子爲善福無必得不爲非禍無必免故得其時則駕不得其時則蓬累而行貴在我矣老子曰人有順逆之氣生於心心治則氣順心亂則氣逆心之治亂在於道得道則心治失道即心亂心治即交讓心亂即交爭讓即有德爭即生賊有德即氣順賊生即氣逆氣順則自損以奉人氣逆則損人以自奉夫氣者可以道而制也天之道其猶響之報聲也德積則福至禍積則怨至學敗於官茂孝衰於妻子患生於憂解病甚於且瘉故愼終如始則無敗事陰符曰五賊在心施行於天氣順則治氣逆則亂治即交讓亂即交爭氣逆乎心則賊於其身氣逆乎時則賊於其國惟以道制氣則能損已奉人雖官茂不能敗吾之學妻子不能衰吾之孝曷有憂解之患且瘉之病哉能愼厥終罔有所失老子曰舉枉與直如何不得舉直與枉勿與遂往所謂同污而異泥者不曰舉枉措直而曰舉枉與直何哉舉枉與直是拔小人而歸於君子何不得乎舉直與枉則是推君子而納諸小人之域君子不往矣同污異泥處小人之道和而不流老子曰聖人同死生愚人亦同死生聖人之同死生明於分理愚人之同死生不知利害之所在道縣天物布地和在人人主不和即天氣不下地氣不上陰陽不調風雨不時人民疾飢和之用至矣天得之萬象明地得之萬物生人得之萬事成人主之心和其可失乎失則天地不交人民疾飢夫聖愚同一死生其不同者義與利之間耳利者義之和聖人明於理分利亦義也愚人不知利害之所在義亦利焉老子曰得萬人之兵不如聞一言之當得隨侯之珠不如得事之所由得和氏之璧不如得事之所適天下雖大好用兵者亡國雖安好戰者危故小國寡民雖有什伯之器而勿用禹拜昌言班師振旅而苗民格聞一言之當勝萬兵也得隨珠和璧不如得事之所由適是以聖人貴道不貴寳尚德不尚功肯以兵自危哉老子曰能成霸王者必德勝者也能勝敵者必强者也能强者必用人力者也能用人力者必得人心者也能得人心者必自得者也自得者必柔弱者也能勝不如己者至於若己者而格柔勝出於若己者其事不可度故能以衆不勝成大勝者唯聖人能之德勝者霸得人心也勝敵者强得人力也然非得人之心未有能用人之力也敵何由勝强何由霸哉德自得也自得則柔弱勝剛强故能勝不若己者至於若己者而格是德相若也柔勝出於若己者其事不可度則德又勝我矣故能以衆不勝成大勝者惟聖人能之通玄眞經纘義卷之四
