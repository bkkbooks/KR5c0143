front:
  text: 通玄真經纘義卷之十二非十二
  hash: sha256:94c068c073997035ae8b47f9b2006705938501408b57c09c6f5937c82d302c2c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0143_HFL_012-001a, image: hfl/0524/0524-162.png}
body:
  text: 南谷子杜道堅纂上禮篇老子曰上古真人呼吸陰陽而群生莫不仰其德以和順當此之時莫不領理隱密自成純朴未散而萬物大優及世之衰也至虙犧氏昧昧懋懋皆欲離其童蒙之心而覺悟乎天地之間其德煩而不一及至神農黃帝核領天下紀綱四時和調陰陽於是萬民莫不竦身而思戴視聽故治而不能和下至夏殷之世嗜欲連於物聰明誘於外性命失其真施及周室澆醇散朴離道以為偽險德以為行知巧萌生狙學以擬聖華誕以脅衆琢飾詩書以賈名譽各欲以行其智偽以容於世而失大宗之本故世有喪性命衰漸所由來久矣是故至人之學也欲反性於無遊心於虛世俗之學耀德攓性內愁五藏暴行越知以譊名聲於世此至人所不為也耀德自見也攓性絶生也若夫至人定乎生死之意通乎榮辱之理舉世而譽之不加勸舉世而非之不加沮得至道之要也上禮者吉凶軍賔嘉五禮之謂歟上古真人則玄古之君也當時群生純朴萬物大優自虙犧氏逮於神農黃帝施及三王治各不同禮亦隨變至五伯戰國而大宗之本失矣老子曰古者被髮而無卷領以王天下其德生而不殺與而不奪天下不非其服同懷其德當此之時陰陽和平萬物蕃息飛鳥之巢可俯而探也走獸可係而從及其衰也鳥獸蟲蛇皆為人害故鑄鐵煆刃以禦其難夫民迫其難即求其便因其患即造其備各以其智去其所害就其所利常故不可循器械不可因故先王之法度有變易者也故曰名可名非常名也五帝異道而德覆天下三王殊事而名立後世此因時而變者也譬猶師曠之調五音也所推移上下無常尺寸以度而靡不中者故通於樂之情者能作音有本主於中而知規矩鉤繩之所用者能治人故先王之制不宜即廢之末世之事善即著之故聖人之制禮樂者不制於禮樂制物者不制於物制法者不制於法故曰道可道非常道也天道摩常世變愈下古者之君被髮而無卷領天下不非其服者民物蕃息同懷其德矣及其衰也鳥獸蟲蛇皆為人害法度器械因時而變由是兵革興焉老子曰昔者聖王仰取象於天俯取度於地中取法於人調陰陽之氣和四時之節察陵陸水澤肥墽高下之宜以立事生財除飢寒之患辟疾疢之災中受人事以制禮樂行仁義之道以治人倫列金木水火土之性以立父子之親而成家聽五音清濁六律相生之數以立君臣之義而成國察四時孟仲季之敘以立長幼之節而成官列地而州之分職而治之立大學以教之此治之綱紀也得道即舉失道即廢夫物未嘗有張而不弛成而不敗者也唯聖人可成而不衰天地一元之理人身一生之理乎知生之始即開物之初則知生之前乃開物之前矣人之幼而壯即元之會而運壯而老即運而世也知少化即壯壯化即老老化即死則開物之後可知矣若夫化化而不化者其唯聖人乎聖人初作樂也以歸神杜淫反其天心至其衰也流而不反淫而好色不顧正法流及後世至於亡國其作書也以領理百事愚者不以忘智者以記事及其衰也為姦偽以解有罪以殺不辜其作囿也以奉宗廟之具簡士卒以戒不虞及其衰也馳騁弋獵以奪民時以罷民力其尚賢也以平教化正獄訟賢者在位能者在職澤施於下萬民懷德及其衰也朋黨比周各推其所與廢公趨私外內相舉姦人在位賢者隱處文子之書萬世之龜鑑也聖人建事之初意樂則歸神杜淫書以領理百事囿以成宗廟之具尚賢以平教化正獄訟之情及其衰也樂則淫色書則姦偽囿則弋獵賢則朋黨姦人在位賢者隱處宜矣天地之道極則反益則損故聖人治弊而改制事終而更為其美在和其失在權聖人之道曰非修禮義廉恥不立民無廉恥不可以治不知禮義法不能正非崇善廢醜不嚮禮義無法不可以為治不知禮義不可以行法法能殺不孝者不能使人孝能刑盜者不能使人廉聖王在上明好惡以示人經非譽以導之親賢而進之賤不肖而退之刑錯而不用禮義修而任賢德也故天下之高以為三公一州之高以為九卿一國之高以為二十七大夫一鄉之高以為八十一元士天地之大非人不立帝王之尊非民何戴四方之衆非禮義廉恥不能為治是以聖人革弊更制必以禮義廉恥為之四維賢者在職禮義修而刑錯不用矣智過萬人謂之英千人謂之雋百人者謂之傑十人者謂之豪明於天地之道通於人情之理大足以容衆惠足以懷遠智足以知權人英也德足以教化行足以隱義信足以得衆明足以照下人雋也行可以為儀表智足以決嫌疑信可以守約廉可以使分財作事可法出言可道人傑也守職不廢處義不比見難不苟免見利不苟得人豪也英雋豪傑各以大小之材處其位由本流末以重制輕上唱下和四海之內一心同歸背貪鄙嚮仁義其於化民若風之靡草今使不肖臨賢雖嚴刑不能禁其姦小不能制大弱不能使強天地之性也故聖人舉賢以立功不肖之主舉其所與同觀其所舉治亂分矣察其黨與賢不肖可論也古者選士之法道德為上仁義禮樂次之書數法度又次之英雋豪傑乃以智取之豈戰國之法歟夫天下之理小不足以制大弱不足以制強從衡捭闔之論行雖嚴刑不能禁其姦矣老子曰為禮者雕琢人性矯拂其情目雖欲之禁其度心雖樂之節以禮趨翔周旋屈節卑拜肉凝而不食酒澄而不飲外束其形內愁其意鉗陰陽之和而迫性命之情故終身為哀人何則不本其所以欲而禁其所欲不原其所以樂而防其所樂是猶圜獸不塞其垣而禁其野心決江河之流而雍之以手故曰開其兊濟其事終身不救夫禮者遏情間欲以義自防雖情心㖥噎形性飢渴以不得已自強故莫能終其天年禮者非能使人勿欲也而能止之樂者非能使人勿樂也而能防之禮者檢身之式防邪之具天下之通道也如顔子之視聽言動以禮存心則非禮者自不能入矣夫禮之用以和為貴君子之心滿腔是禮誠於中形於外而自然之和盎乎天地人情以之洽陰陽以之和萬物以之育夫使天下同畏刑而不敢盜竊豈若使無有盜心哉故知其無所用雖貪者皆辭之不知其無所用廉者不能讓之夫人之所以亡社稷身死人手為天下笑者未嘗非欲也知冬日之扇夏日之裘無用於己則萬物變為塵垢矣故揚湯止沸沸乃益甚知其本者去火而已盜竊之難治也久矣竊鉤者誅竊國者為諸侯是盜在上而不在下若堯之茅茨不剪朴桷不斫雖賞之不竊也傾宫瑶臺瓊室玉門桀紂之過身死人手悲夫老子曰循性而行謂之道得其天性謂之德性失然後貴仁道失然後貴義仁義立而道德廢純朴散而禮樂飾是非形而百姓眩珠玉貴而天下爭夫禮者所以别尊卑貴賤也義者所以和君臣父子兄弟夫婦人道之際也末世之禮恭敬而交為義者布施而得君臣以相非骨肉以生怨也故水積即生相食之蟲土積即生自肉之狩禮樂飾即生詐偽事物之用未有久而不弊者也雖道之可循德之可得苟非其時亦不能行君臣尚義猶不免於相非父子主恩或不免於生怨是豈人心之固有哉末世之為治不積於養生之具澆天下之淳散天下之朴滑亂萬民以清為濁性命飛揚皆亂以營貞信爛熳人失其性法與義相背行與利相反貧富之相傾人君之與僕虜不足以論夫有餘則讓不足則爭讓則禮義生爭則暴亂起故多欲則事不省求贍則爭不止故世治則小人守正而利不能誘也世亂則君子為姦而法不能禁也人以食為命一日不食則飢三日不食則病七日不食則死古者國有十年之儲故能當九年之水七年之旱而民不死也末世之為治不積養生之具蓋由人主多欲不能省事上不足贍則必取於下下不足養則必爭於時食其重矣哉老子曰衰世之主鑽山石挈金玉摘硥蜃銷銅鐵而萬物不滋刳胞焚郊覆巢毁邜鳳凰不翔麒麟不遊搆木為臺焚林而畋竭澤而漁積壤而丘處掘地而井飲濬川而為池築城而為固拘獸以為畜則陰陽繆戾四時失敘雷霆毁折雹霜為害萬物焦夭處於太半草木夏枯三川絶而不流分山川溪谷使有壤界計人衆寡使有分數設機械陰阻以為備制服色等異貴賤差殊賢不肖行賞罰則兵革超而忿爭生虐殺不辜誅罰無罪於是興矣盈而不知止者天地鬼神之所共譴也夫陰陽繆戾四時失敘雷霆毁折雹霜為害萬物焦夭川絶不流是皆虧盈變盈害盈之所致不能省愆則必有人道惡盈之禍起是可畏也老子曰世之將喪性命猶陰氣之所起也主暗昧而不明道廢而不行德滅而不揚舉事戾於天發號令逆四時春秋縮於和天地除其德人君處位而不安大夫隱遁而不言群臣準上意而壞常疏骨肉而自容袤人諂而陰謀遽戴驕主而像其亂人以成其事是故君臣乖而不親骨肉疏而不附田無立苖路無緩步金積折廉璧襲無贏殼龜無腹蓍筮日施天下不合而為一家諸侯制法各異習俗悖拔其根而棄其本鑿五刑為刻削爭於錐刀之末斬刈百姓盡其大半舉兵為難攻城濫殺覆高危安大衝車高重壘除戰隊使陳死路犯嚴敵百往一反名聲苟盛兼國有地伏尸數十萬老弱飢寒而死者不可勝計自此之後天下未嘗得安其性命樂其習俗也陽生陰殺二氣更遷國運興衰固若有數然則六運交終一陰肇始洚水示警九年為災自非有堯舜禹三聖人者出噍類絶矣是故興衰有數治亂由人賢聖勃然而起持以道德輔以仁義近者進其智遠者懷其德天下混而為一子孫相代輔佐黜讒佞之端息末辨之説除刻削之法去煩苛之事屏流言之迹塞朋黨之門消智能循大常隳肢體黜聰明大通混溟萬物各復歸其根夫聖人非能生時時至而不失也是以不得中絶古人立教三公論道燮理陰陽存其亡治其亂有聖賢者起持以道德輔以仁義黜邪佞之臣去煩苛之事屏流言之迹塞朋黨之門混天下為一家子孫相代而治老子曰酆水之深十仞而不受塵垢金石在中形見於外非不深且清也魚鱉蛟龍莫之歸也石上不生五穀秃山不遊麋鹿無所蔭庇也故為政以苛為察以切為明以刻下為忠以計多為功如此者譬猶廣草也大即大裂之道也其政悶悶其民淳淳其政察察其民缺缺水太清者魚鱉不入懼網罟之害也山不毛者麋鹿下遊失蔭庇之安也石上不生五穀無著根之地也末世之政以苛為察以切為明以尅下為忠以計多為功者明主不取焉老子曰以正治國以奇用兵先為不可勝之政而後求勝於敵以未治而攻人之亂是猶以火應火以水應水也同莫足以相治故以異為奇奇靜為躁奇治為亂奇飽為飢奇逸為勞奇正之相應若水火金木之相伐也何往而不勝故德均即衆者勝寡力敵則智者制愚智同即有數者禽無數文子之書前以皇起後以霸終其皇帝王霸之書也以正治國以奇用兵此古今之通論霸者則不然用兵以奇治國亦以奇則是政復為奇善復為妖矣於戲治國失政而以奇為務者尚何足以多算云哉通玄真經纘義卷之十二通玄真經纘義釋音卷一道原篇泏音汨流通之義音垤止也殰音讀胎內敗也詘音屈同義滑音汨溼音濕袤音斜湛音沉溺也惋音腕驚歎也嘏音假大也汜音泛訾音紫內容不辨蚑蟯上音岐下音饒小蟲之類創音瘡淖音鬧和也毳充芮切志柔也亶多旱切信也憎音慘毒也枹音桴擊鼓杖也蹎音顚徐步而行瞑音眠平目而視軻音可志不平貌卷二精誠篇暴音曝譎音決詐也賈音價數也螫音釋蟲毒也繆音妙同義仿佯倘徉同義囹圄上零下語獄名也噞魚檢切焦飲水也呼上音叫下去聲大呼也景音影形景義同倕音垂工輸也亡音無同義囷區倫切圓廪也卷三九守篇便寧上毗連切安也影柱有若無也不為物纍建鼓實若虛也不為聲動攓音蹇同義睫音睫同義侑巵上音宥欹器也登假下音遐同義卷四符言篇倍音悖同義要音邀天下雙雙兼也兼者霸屈九勿切屈奇也懾音摺愈音愈卷五道德篇稸聚也蓄同義刺七賜切賈便上音古下平聲蠕音軟𧍒螻蟲也蜎音淵飛蟲也劌妙衛切無傷也捽存兀切扯也趣音趨亟去利切疾也罷音疲卷六上德篇樅七容切狖余救切猿屬晞音希乾也堁音課塵土也瑗音院璧也礛力甘切儲音諸磨礪之石螿音將蟬屬枘而鋭切椓音卓治木之具眥疾智切目匡也䋤音藥絲麻之屬音未履屬蹍女展切踏也麃音瀌盛也軵音勇推車之謂海內下音納鷙音至鷹屬橑音老椽屬黯音暗黣音昧蝮孚六切虺屬萑音尤蘆屬提音時羣聚貌凶上聲惡貌蚈音賢螟蚣也準鼻頭曰準跬犬蕊切半步也凷音塊同義呰音訾辨也紼浮費切扉同義裒音抔聚也湛音沉荂音孚物不榮也偯音依卷七微明篇軤音孚喝車聲苛悄上音何下音峭猛急也稱音稱舉揚也覡音檄男巫曰覡女曰巫煦吁句切暖氣育物卷八自然篇徼音邀同羲窊烏瓜切地四也褒不褒不為大也褊不褊不為小也亟去吏切急也縣乃鳥切推版具輴音椿𧿨與之與樏音螺肩輿之具瘦音瘦同義骿胝上胼下脂手足皮厚也詘音屈卷九下德篇圉音禦同義脅音協同義窳音愈勞也病也敖世上音傲伉行上音亢下去聲卷十上仁篇蟻蟻同義镺𨱵上於倒切下乃倒切獸之長大者罝罘上音噬下音浮兔網也𦉾罟上音網下音古漁網也隼音筍鷙鳥也鷇音寇鳥初出卵跖音隻跳也躣也偄軟同義瘦同義前賜切骨粗惡囦淵同義卷十一上義篇璜半璧曰璜美玉刎音吻割也遍音邊遍類同類邃隧曰深也詆音氐訶也卷十二上禮篇懋瞀同義目不明攓搴同義攓取也譊音鐃急呼也墽音墝同義瘠也疢音病也錯音措同義置也圜與圈同養獸間雍音壅塞也㖥渠隕切哽同義硥音蚌同義除音住開也通玄真經纘義釋音
