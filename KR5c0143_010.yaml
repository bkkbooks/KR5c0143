front:
  text: 通玄眞經纘義卷之十非十
  hash: sha256:0fd5a10b8b911418b4c3d5335d4c6a193a3a94d91fbbdc6ba828a71b88e27e9d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0143_HFL_010-001a, image: hfl/0524/0524-100.png}
body:
  text: 南谷子杜道堅纂上仁篇老子曰君子之道靜以修身儉以養生靜則下不擾儉則民不怨下擾則政亂民怨則德薄政亂賢者不爲謀德薄勇者不爲鬥亂主則不然一日有天下之富處一主之勢竭百姓之力以養耳目之欲志專於宫室臺榭溝池苑囿猛獸珍怪貧民饑餓虎狼厭芻豢百姓寒凍宫室衣綺繡故人主畜兹無用之物而天下不安其性命矣上仁者靜以修身儉以養民君子之所當爲者也下擾政亂民怨德薄君子不爲矣肯作無益以害有益畜無用以蠹有用哉老子曰非淡漠無以明德非寧靜無以致遠非寬大無以制斷以天下之目視以天下之耳聽以天下之智慮以天下之力爭故號令能下究而臣情得上聞百官修達群臣輻凑喜不以賞賜怒不以誅罪法令詧而不苛耳目通而不闇善否之情日陳於前而不逆故賢者盡其智不肖者竭其力近者安其性遠者懷其德得用人之道也淡漠寧靜寬大正平仁政之事也夫用人之道以天下之目視耳聽則聰明廣以天下之智慮力爭則功業大故賢者盡智愚者竭力近者懷恩遠者服德此三代之所以乆後世無以及之夫乗輿馬者不勞而致千里乗舟楫者不游而濟江海使言之而是雖商夫芻蕘猶不可棄也言之而非雖在人君卿相猶不可用也是非之處不可以貴賤尊卑論也其計可用不羞其位其言可行不貴其辯闇主則不然群臣盡誠效忠者稀不用其身也而親習袤枉賢者不能見疏遠卑賤竭力盡忠者不能聞也有言者窮之以辭有諫者誅之以罪如此而欲安海内存萬方其離聰明亦以遠矣造物假我則有奪我則無假之爲用大矣哉夫輿馬之代步舟楫之濟涉千里可不勞而至者假得其力也君假臣以爲治臣假君以行志失假借之用獨夫而已惟明君而後足以與此老子曰能尊生者雖富貴不以養傷身雖貧賤不以利累形今受先祖之遺爵必重生之所由來乆矣而輕失之豈不惑哉故貴以身治天下則可以寄天下愛以身爲天下乃可以託天下人莫重於生而曰尊生尊生者無嗜欲殺身之害也人受父祖之澤而不自保守過有求於所養反至喪身傾家之禍者惑滋甚矣文子問治國之本老子曰本在於治身未嘗聞身治而國亂身亂而國治也故曰修之身其德乃眞道之所以至妙者父不能教子子亦不能受之於父故道可道非常道名可名非常名也國之本在家家之本在身文子問治國之本老子語以本在治身則是身治而後家治家治而後國治矣身猶國也國猶身也詩云執柯伐柯其則不遠文子問曰何行而民親其上老子曰使之以時而敬愼之如臨深淵如履薄冰天地之間善即吾畜之不善即吾讎也昔者商夏之臣反讎桀紂而臣湯武宿沙之民自攻其君而歸神農氏故曰人之所畏不可不畏也舜有善行天下慕之文子問何行而民親其上老子語以使之以時而敬愼之善即吾畜不善即吾讎則是君之視臣如犬馬臣之視君如寇讎矣民能戴君能覆君斯可畏也老子曰治大者道不可以小地廣者制不可以狹位高者事不可以煩民衆者教不可以苛事煩難理法苛難行求多難贍寸而度之至丈必差銖而稱之至石必過石稱丈量徑而寡失大較易爲智曲辯難爲慧故無益於治有益於亂者聖人不爲也無益於用有益於費者智者不行也故功不厭約事不厭省求不厭寡功約易成事省易治求寡易贍任於衆人則易故小辯害義小義破道道小必不通通必簡量有寬狹智有淺深地廣民衆非淺智狹量所能理況任高治大其可以叢脞猥情爲哉小辯害義小義害道此小人之事也君子不爲矣河以逶迤故能遠山以陵遲故能高道以優游故能化夫通於一伎審於一事察於一能可曲說不可廣應也夫調音者小弦急大弦緩立事者賤者勞貴者佚道之言曰芒芒昧昧因天之威與天同氣者帝同義者王同功者霸無一焉者亡故不言而信不施而仁不怒而威是以天心動化者也施而仁言而信怒而威是以精誠爲之者也施而不仁言而不信怒而不威是以外貌爲之者也故有道以治之法雖少足以治無道以治之法雖衆足以亂小器易盈必不可乆大器晩成必得其壽與天同氣者帝同義者王同功者霸無一者亡故有道以理之則法簡而易治無道以理之則法煩而易亂老子曰鯨魚失水則制於螻螘人君舍其所守而與臣爭事則制於有司以自爲持位守職者以聽從取容臣下藏智而不用反以事專其上人君者不任能而好自爲則智日困而自負責數窮於下則不能伸理行墮於位則不能持制智不足以爲治威不足以爲刑即無以與天下交矣喜怒形於心嗜欲見於外即守職者離正而阿上有司枉法而從風賞不當功誅不應罪即上下乖心君臣相怨百官煩亂而智不能解非譽萌生而明不能照非己之失而反自責即人主愈勞人臣愈佚是代大匠斲也夫代大匠斲者稀有不傷其手矣人主失道受制於臣猶鯨魚失水爲蟻所制也夫爲君之道在乎命賢擇相而已相得其賢百官未有不正天下未有不治一失所守而與臣下爭能者不待下之所制將自困矣與馬逐走筋絶不能及也上車攝轡馬使衡下伯樂相之王良御之明主乗之無御相之勞而致千里善乗人之資也人君之道無爲而有就也有立而無好也有爲即議有好即諛議即可奪諛即可誘夫以建而制於人者不能治國故善建者不拔言建之無形也唯神化者物莫能勝中欲不出謂之扃外袤不入謂之閉中扃外閉何事不節外閉中扃何事不成故不用之不爲之而有用之而有爲之不伐之言不奪之事循名責實使自有司以不知爲道以禁苛爲主如此則百官之事各有所考夫與馬逐走是君與臣角力也登車致遠是任臣以成治也有爲即議有好即諛唯神化者凡用可節私謁不行官盡職而事有考矣老子曰食者民之本也民者國之基也故人君者上因天時下盡地利中用人力是以羣生遂長萬物蕃植春伐枯槁夏收百果秋蓄蔬食冬取薪蒸以爲民資生無乏用死無傳尸先王之法不掩羣而取镺𨱵不涸澤而漁不焚林而獵豺未祭獸罝罘不得通於野獺未祭魚網罟不得入於水鷹隼未擊羅網不得張於谷草木未落斤斧不得入於山林昆蟲未蟄不得以火田育孕不殺鷇卵不探魚不長尺不得取犬豕不期年不得食是故萬物之發生若蒸氣出先王之所以應時修備富國利民之道也非目見而足行之也欲利民不忘乎心則民自備矣富國者民養民者食基本之論也因天時盡地利用人力三才之道備然後羣生遂長萬物蕃植民賴以食國藉以富豈不謂生財有大道者乎老子曰古者明君取下有節自養有度必計歲而收量民積聚知有餘不足之數然後取奉如此即得承所受於天地而不罹於饑寒之患憯怛於民也國有饑者食不重味民有寒者冬不被裘與民同苦樂則天下無哀民闇主即不然取民不裁其力求下不量其積男女不得耕織之業以供上求力勤財盡有旦無暮君臣相疾且人之爲生也一人蹠耒而耕不益十畝中田之收不過四石妻子老弱仰之而食或時有災害之患無以供上求即人主愍之矣貪主暴君涸漁其下以適無極之欲則百姓不被天和履地德矣堯之爲君視民猶己取下有節自奉有度故人無惡逆比屋可封是以明君之治必計歲豐歉量民虚實然後取奉民無怨咨天亦無譴焉老子曰天地之氣莫大於和和者陰陽調日夜分故萬物春分而生秋分而成生之與成必得和之精故積陰不生積陽不化陰陽交接乃能成和是以聖人之道寬而慄嚴而温柔而直猛而仁夫太剛則折太柔則卷道正在於剛柔之間夫繩之爲度也可卷而懷之引而伸之可直而布之長而不横短而不窮直而不剛故聖人體之夫恩推即偄偄即不威嚴推即猛猛即不和愛推即縱縱即不令刑推即禍禍即無親是以貴和也氣以和爲主天地和而萬象明陰陽和而百物生君臣和而朝廷治父子和而家道成上下和而人事濟榮衛和而身康寧和之義大矣哉老子曰國之所以存者得道也所以亡者理塞也故聖人見化以觀其徵德有昌衰風爲先萌故得存道者雖小必大有亡徵者雖成必敗國之亡也大不足恃道之行也小不可輕故存在得道不在於小亡在失道不在於大故亂國之主務於地廣而不務於仁義務在高位而不務於道德是捨其所以存而造其所以亡也若上亂三光之明下失萬民之心孰不能承故審其己者不備諸人也天下通行之謂道萬古不易之謂理故道理最大自古有國家者得道則昌失理則亡夫務高位地廣而不務道德仁義猶木之無根槁仆可俟也古之爲君者深行之謂之道德淺行之謂之仁義薄行之謂之禮智此六者國家之綱維也深行之則厚得福淺行之則薄得福盡行之天下服古之修道德即正天下修仁義即正一國修禮智即正一鄉德厚者大德薄者小故道不以雄武立不以堅强勝不以貪競得立在於天下推己勝在於天下自服得在於天下與之不在於自取故雌牝即立柔弱即勝仁義即得不爭即莫能與之爭故道之在天下也譬猶江海也道德仁義禮智根于心者一夫行之有淺深施之有厚薄名從實立六者分焉雖然同一善也上者善則下者莫敢不善後世不修道德專以勢力爲治而國危矣天之道爲者敗之執者失之夫欲名之大而求之爭之吾見其不得已雖執而得之不留也夫名不可求而得也在天下與之與之者歸之天下所歸者德也故云上德者天下歸之上仁者海内歸之上義者一國歸之上禮者一鄉歸之無此四者民不歸也不歸即用兵用兵即危道也故曰兵者不祥之器也不得已而用之用之殺傷人勝而勿美故曰死地荆棘生焉以悲哀泣之以喪禮居之是以君子務道德而不用重兵也天道自然有爲則失名者實之賔名之大莫如君君有德則名不待求而天下與之與之者歸之也此二帝三王之所以優而五霸七雄之所以劣不用道德而務用兵者去天道遠矣文子問曰仁義禮智何以爲薄於道德也老子曰爲仁者必以哀樂論之爲義者必以取與明之四海之内哀樂不能徧竭府庫之貨財不足以贍萬民故知不如修道而行德因天地之性萬物自正而天下贍仁義因附是以大丈夫居其厚不居其薄夫禮者實之文也仁者恩之效也故禮因人情而制不過其實仁不溢恩悲哀抱於情送死稱於仁文子問仁義禮何以薄於道德老子語以爲仁者必以哀樂論之爲義者必以取與明之夫哀樂取與涉於有爲海宇之民可哀者衆可樂者寡府庫之財取之有限與之易竭道德無爲任萬物之自正而天下贍足夫養生不强人所不能及不絶人所不能已度量不失其適非譽無由生矣故制樂足以合懽不出於和明於生死之分通於侈儉之適也末世即不然言與行相悖情與貌相反禮飾以煩樂擾以淫風俗濁於世非譽萃于朝故至人廢而不用也與驥逐走即人不勝驥託於車上即驥不勝人故善用道者乗人之資以立功以其所能託其所不能也主與之以時民報之以財主遇之以禮民報之以死故有危國無安君有憂主無樂臣德過其位者尊禄過其德者凶德貴無高義取無多不以德貴者竊位也不以義取者盜財也聖人安貧樂道不以欲傷生不以利累己故不違義而妄取天下之生乆矣得其養則生益蕃故賢君不强人所不能及亦不絶人所不能已民均得其養是故安貧而樂道不以欲傷生不違義而取其可多欲乎古者無德不尊無能不官無功不賞無罪不誅其進人也以禮退人也以義小人之世其進人也若土之天其退人也若内之淵言古者以疾今也相馬失之痠選士失之貧豚肥充厨骨貲不官君子察實無信讒言君過而不諫非忠臣也諫而不聽君不明也民沉溺而不憂非賢君也故守節死難人臣之職也衣寒食饑慈父之恩也以大事小謂之變人以小犯大謂之逆天前雖登天後必入囦故鄉里以齒老窮不遺朝廷以爵尊卑有差選士之法如德行言語政事文學有一於是宜可仕也四無一焉則是沐猴而冠矣古者無德不尊無能不官無功不貴無罪不誅故官不失人人不失用夫崇貴者謂其近君也尊老者謂其近親也敬長者謂其近兄也生而貴者驕生而富者奢故富貴不以明道自鑒而能無爲非者寡矣學而不厭所以治身也教而不倦所以治民也有賢師良友舍而爲非者寡矣知賢之謂智愛賢之謂仁尊賢之謂義敬賢之謂禮樂賢之謂樂父子主恩君臣主義知恩義而忠孝之太立能崇貴尊老敬長可謂知本矣能知賢愛賢尊賢敬賢樂賢則求賢養賢用賢之道得矣古之善爲天下者無爲而無不爲也故爲天下有容能得其容無爲而有功不得其容動作必凶爲天下有容者豫兮其若冬涉川猶兮其若畏四鄰儼兮其若客涣兮其若冰之液敦兮其若樸混兮其若濁廣兮其若谷此謂天下之容也豫兮其若冬涉川者不敢行也猶兮其若畏四鄰者恐自傷也儼兮其若客者謹爲恭敬也涣兮其若冰之液者不敢積藏也敦兮其若樸者不敢廉成也混兮其若濁者不敢清明也廣兮其若谷者不敢盛盈也進不敢行者退而不敢先也恐自傷者守柔弱不敢矜也謹於恭敬者自卑下尊敬人也不敢積藏者自損弊不敢堅也不敢廉成者自虧缺不敢全也不敢清明者處濁辱而不敢新鮮也不敢盛盈者見不足而不敢自賢也夫道退故能先守柔弱故能矜自卑下故能高人自損弊故實堅自虧缺故盛全處濁辱故新鮮見不足故能賢道無爲而無不爲也孔德之容惟道是從古之善爲天下者無爲而無不爲天下之大民物之衆無不容矣此無爲之功所以大而天下之民所以戴之而不重也通玄眞經纉義卷之十
