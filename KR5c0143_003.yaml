front:
  text: 通玄眞經纘義卷之三非三
  hash: sha256:3a9c0f86e95c9d3e96d1562aaa61e2abe176f8a72bea7efb82482ed7634cd0e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0143_HFL_003-001a, image: hfl/0523/0523-086.png}
body:
  text: 南谷子杜道堅纂九守篇老子曰天地未形窈窈㝠㝠混而爲一寂然清澄重濁爲地精微爲天離而爲四時分而爲陰陽精氣爲人粗氣爲蟲剛柔相成萬物乃生精神本乎天骨骸根於地精神入其門骨骸反其根我尚何存故聖人法天順地不拘於俗不誘於人以天爲父以地爲母陰陽爲綱四時爲紀天靜以清地定以寧萬物逆之者死順之者生故靜漠者神明之宅虚無者道之所居夫精神者所受於天地骨骸者所稟於地也道生一一生二二生三三生萬物萬物負陰而抱陽冲氣以爲和一者形之始九乃數之成九究也聖人究於九而守乎一道在我矣一即心心即天天即人人即物物即道道即我我即始能知古始是謂道紀老子曰人受天地變化而生一月而膏二月而血脉三月而胚四月而胎五月而筋六月而骨七月而成形八月而動九月而躁十月而生形骸已成五藏乃分肝主目肺主鼻脾主舌腎主耳贍主口外爲表中爲裏頭圜法天足方象地天有四時五行九曜三百六十日人有四支五藏九竅三百六十節天有風雨寒暑人有取與喜怒膽爲雲肺爲氣脾爲風腎爲雨肝爲雷人與天地相類而心爲之主耳目者日月也血氣者風雨也日月失行薄蝕無光風雨非時毁折生災五星失行州國受其殃物之所始一之所起變而化之萬物生焉父天母地陰陽交感胚胎孕育雜糅之氣爲物純粹之氣爲人是故天地萬物備於吾身夫翕張與奪天之道也逆之則死順之則生天地之道至閎以大尚猶節其章光愛其神明人之耳目何能乆熏而不息精神何能馳騁而不乏是故聖人守内而不失外夫血氣者人之華也五藏者人之精也血氣專乎内而不外越則胸腹充而嗜欲寡嗜欲寡則耳目清而聽視聰達聽視聰達謂之明五藏能屬於心而無離則氣意勝而行不僻精神盛而氣不散以聽無不聞以視無不見以爲無不成患禍無由入邪氣不能襲故所求多者所得少所見大者所知小天之生物不動則植動者横行植者直立人兼動植之用故靈於萬物四支百體精神血氣可不自愛胡可以多求王公大人受天下之寄則又兼乎人兼乎物愛之畜之不異其身然後爲盡道夫孔竅者精神之户牖血氣者五藏之使候故耳目淫於聲色即五藏動揺而不定血氣淊蕩而不休精神馳騁而不守禍福之至雖如丘山無由識之矣故聖人愛而不越聖人誠使耳目精神玄達無所誘慕意氣無失清靜而少嗜欲五藏便寧精神内守形骸而不越即觀乎往世之外來事之内禍福之間可足見也故其出彌遠者其知彌少以言精神不可使外淫也故五色亂目使目不明五音入耳使耳不聰五味亂口使口生創趨舍滑心使行飛揚故嗜欲使人氣淫好憎使人精勞不疾去之則志氣日耗河水雖廣風日耗之精神雖王物欲滑之未有不消减者也聖人玄達無所誘慕精神内固形體外便心室空虚神明來舍往世之外來事之前靡不洞燭心虚故也養生之道無他術如養馬焉去其害馬者而已夫人所以不能終其天年者以其生生之厚夫唯無以生爲者即所以得長生天地運而相通萬物總而爲一能知一即無一之不知也不能知一即無一之能知也吾處天下亦爲一物而物亦物也物之與物何以相物欲生不可事也憎死不可辭也賤之不可憎也貴之不可喜也因其資而寧之弗敢極也弗敢極即至樂極矣物有不待使而生求而養天也必待使而生求而養則人矣人或過有使之求之之心則揠苗助長反致傷生失養之害不能全其天年聖人天地相通與物爲一不益生不外死賤而不憎貴而不喜因其資而寧之弗敢極則至樂極矣守虚一老子曰所謂聖人者因時而安其位當世而樂其業夫哀樂者德之袤也好憎者心之累也喜怒者道之過也故其生也天行其死也物化靜即與陰合德動即與陽同波故心者形之主也神者心之寳也形勞而不休即蹷精用而不已則竭是以聖人遵之不敢越也以無應有必究其理以虛受實必窮其節恬愉虛靜以終其命無所疏無所親抱德煬和以順於天與道爲際與德爲鄰不爲福始不爲禍先死生無變於己故曰至神神則以求無不得也以爲無不成也聖人虚己以游世順天而行因時而作不以利害動其心不以死生變於己以虚受實抱德煬和禍不爲先福不爲始事至而應響答如神應己則靜是謂守虚守無二老子曰輕天下即神無累細萬物則心不惑齊生死則意不懾同變化則名不眩夫至人倚不撓之柱行無關之途禀不竭之府學不死之師無往而不遂無之而不通屈伸俛仰抱命不惑而宛轉禍福利害不足以患心夫爲義者可迫以仁而不可劫以兵可正以義不可縣以利君子死義不可以富貴留也爲義不可以死亡恐也又況於無爲者乎無爲者無累無累之人以天下爲影柱上觀至人之倫深原道德之意下考世俗之行乃足以羞也夫無以天下爲者學之建皷也無不生無而生有有喪則復歸於無有不可以無無無無則有不能以自有知有乃無之利無乃有之用則知無不無無不無無即道有不常有不常有即物是以聖人富不以有貧不以無齊物我一死生而不累於神自有不亡者在是謂守無守平三老子曰尊勢厚利人之所貪比之身則賤故聖人食足以充虚接氣衣足以蓋形禦寒適情辭餘不貪得不多積清目不視靜耳不聽閉口不言委心不慮棄聰明反太素休精神去知故無好無憎是謂大通除穢去累莫若未始出其宗何爲而不成知養生之和者即不可縣以利通内外之符者不可誘以勢無外之外至大無内之内至貴能知大貴何往不遂道貴乎守有守則成心貴乎平平則不傾世之尊勢厚利人所共貪貪則不平之心生非可守之道也故聖人食取充腹衣適被體無厚積之貪是以心平氣定神不外馳合乎大常之道是謂守平中易四老子曰古之爲道者理情性治心術養以和持以適樂道而忘賤安德而忘貧性有不欲無欲而不得心有不樂無樂而不爲無益於性者不以累德不便於生者不以滑和不縱身肆意而制度可以爲天下儀量腹而食制形而衣容身而居適情而行餘天下而不有委萬物而不利豈爲貧富貴賤失其性命哉夫若然者可謂能體道矣多易必多難此以事言也以道言則不然夫古之爲道者治心理性易其身而後動定其意而後舉樂道安常不爲難能之事故制度有法容止可觀安而行之是謂守易守清五老子曰人受氣於天者耳目之於聲色也鼻口之於香臭也飢膚之於寒温也其情一也或以死或以生或爲君子或爲小人所以爲制者異也神者智之淵也神清則智明智者心之府也智公則心平人莫鑑於流潦而鑑於澄水以其清且靜也故神清意平乃能形物之情故用之者必假於不用也夫鑑明者則塵垢不汙也神清者嗜欲不誤也故心有所至神即溉然在之反之於虚則消躁藏息矣此聖人之游也故治天下者必達性命之情而後可也水清則鑑物神清則見道人之受氣於天者固若同然吾之見道於心者夫何獨異心清故也聖人之心明如止水物來則見物去則靜曾何滯於吾心哉澄鑑不撓是謂守清守眞六老子曰夫所謂聖人者適情而已量腹而食度形而衣節乎己而貪汙之心無由生也故能有天下者必無以天下爲也能有名譽者必不以越行求之誠達性命之情仁義乃因附也若夫神無所掩心無所載通洞條達澹然無事勢利不能誘聲色不能淫辯者不能說智者不能動勇者不能恐引眞人之游也夫生生者不生化化者不化不達此道者雖智統天地明照日月辯解連環辭潤金石猶無益於治天下也故聖人不失所守夫聖人者循自然守至眞順其時宜達其衆心惟不逆萬物之情故能心凝形釋純一不己是謂守眞守靜七老子曰靜漠恬澹所以養生也和愉虚無所以據德也外不亂内即性得其宜靜不動和即德安其位養生以經世抱德以終年可謂能體道矣若然者血脉無鬱滯五藏無積氣禍福不能矯滑非譽不能塵垢非有其世孰能濟焉有其才不遇其時身猶不能脱又況無道乎夫目察秋毫之末者耳不聞雷霆之聲耳調金玉之音者目不見太山之形故小有所志則大有所忘今萬物之來擢拔吾性攓取吾精若泉源也雖欲勿禀其可得乎今盆水若清之經日乃見眉䀹濁之不過一撓即不能見方圓人之精神難清而易濁猶盆水也天地之道靜故物不使而自長聖人之治靜則民不教而自能一有喜功生事之心撓其自然亂其天常則靜者失動者惑矣惟不事奇變是謂守靜守法八老子曰上聖法天其次尚賢其下任臣任臣者危亡之道也尚賢者癡惑之原也法天者治天地之道也虚靜爲主虛無不受靜無不持知虚靜之道乃能終始故聖人以靜爲治以動爲亂故曰勿撓勿攖萬物將自清勿驚勿駭萬物將自理是謂天道上聖法天百骸理萬化安其次尚賢法由己出惑之原也其下任臣法出衆口危亡之徵矣修身無法則事惑而精神喪治國無法則政亂而民人傷惟體道爲主是謂守法守弱九老子曰天子公侯以天下一國爲家以萬物爲畜懷天下之大有萬物之多即氣實而志驕大者用兵侵小小者倨傲凌上用心奢廣譬猶飄風暴雨不可長乆是以聖人以道鎮之執一無爲而不損冲氣見小守柔退而勿有法於江海江海不爲故功名自化弗强故能成其王爲天下牝故能神不死自愛故能成其貴萬乗之勢以萬物爲功名權任至重不可自輕自輕則功名不成夫道大以小而成多以少爲主故聖人以道蒞天下柔弱微妙者見小也儉嗇損缺者見少也見小故能成其大見少故能成其美弱者道之用非怯也守其冲和而已天子以天下爲家公侯以國爲家視民猶己不以勢位自强不以兵甲暴衆遠人不服則修文德以來之大資小而成衆戴寡爲主往而不害安平泰是謂守弱天之道抑高舉下損有餘補不足江海處地之不足故天下歸之奉之故聖人卑謙清靜辭讓者見下也虚心無有者見不足也見下故能致其高見不足故能成其賢矜者不立奢者不長强梁者死滿溢者亡飄風暴雨不終日小谷不能須臾盈飄風驟雨行强梁之氣故不能乆而滅小谷處强梁之地故不得不奪是以聖人執雌牝去驕奢不敢行强梁之氣執雌北故能立其雄牡不敢驕奢故能長乆天之道損有餘補不足惡盈好謙也以力者霸以德者王弱勝强矣人之苛政虐民天之暴風折木元氣怒泄强不可乆是故聖人謙卑惟弱是守老子曰天道極即反盈即損日月是也故聖人日損而冲氣不敢自滿日進以牝功德不衰天道然也人之情性皆好高而惡下好得而惡亡好利而惡病好尊而惡卑好貴而惡賤衆人爲之故不能成執之故不能得是以聖人法天弗爲而成弗執而得與人同情而異道故能長乆故三皇五帝有戒之器命曰侑巵其中則正其滿則覆夫物盛則衰日中則移月滿則虧樂終而悲是故聰明廣智守以愚多聞博辯守以儉武力勇毅守以畏富貴廣大守以狹德施天下守以讓此五者先王所以守天下也服此道者不欲盈是以能弊不新成道極則反物盛則衰理之常也巵滿則傾刃剛則折物之常也人能觀乎物理之常不以勢力暴衆自强則無顚蹶之害柔弱保身可以長乆老子曰聖人與陰俱閉與陽俱開能至於無樂也即無不樂也無不樂即至極樂矣是以内樂外不以外樂内故有自樂也即有至貴乎天下所以然者因天下而爲天下之要也不在於彼而在於我不在於人而在於身身得則萬物備矣故達於心術之論者即嗜欲好憎外矣是故無所喜無所怒無所樂無所苦萬物玄同無是無非故士有一定之論女有不易之行不待勢而尊不須財而富不須力而强不利貨財不貪世名不以貴爲安不以賤爲危形神氣志各居其宜天將雨礎先潤時將春凍先解人將死舌先强炁使之然也柔弱者生之徒堅强死之徒强梁而不得其死者則又强梁之尤者也惟氣形和弱與物玄同並育而不害者其殆庶幾夫形者生之舍也氣者生之元也神者生之制也一失其位即三者傷矣故以神爲主者形從而利以形爲主者神從而害貪饕多欲之人顚冥乎勢利誘慕乎名位幾以過人之知位高於世即精神日耗以遠乆淫而不還形閉中拒即無由入矣是以時有盲忘自失之患夫精神志氣者靜而日充以壯躁而日耗以老是故聖人持養其神和弱其氣平夷其形而與道浮沉如此則萬物之化無不偶也百事之變無不應也神依形生精依氣盈交相養而不失其和者養生之主也若夫虚囂恃氣與物爲鬥則將精耗神斃時有盲忘之失近死之徵矣是故聖人弱其形和其氣韜其神而得九守之道聖人豈欺我哉希聖亦聖希賢亦賢守樸老子曰所謂眞人者性合乎道也故有而若無實而若虚治其内不治其外明白太素無爲而復樸體本抱神以游天地之根芒然仿佯塵垢之外逍遥乎無事之業機械智巧不載於心審於無假不與物遷見事之化而守其宗心意專於内通達禍福於一居不知所爲行不知所之不學而知弗視而見弗爲而成弗治而辯感而應迫而動不得已而往如光之燿如影之效以道爲循有待而然廓然而虛清靜而無以千生爲一化以萬異爲一宗有精而不使有神而不用守大渾之樸立至精之中其寢不夢其智不萌其動無形其靜無體存而若亡生而若死出入無間役使鬼神精神之所以能登假于道者也使精神暢達而不失於元日夜無隙而與物爲春即是合而生時於心者也故形有靡而神未嘗化以不化應化千變萬轉而未始有極化者復歸於無形也不化者與天地俱生也故生生者未嘗生其所生者即生化化者未嘗化其所化者即化此眞人之游也純粹之道也眞人守大渾之樸游天地之根同乎大通廓然無眹惟不有我故不無物人笑亦笑人哭亦哭千變萬化而未始有夫極也化者復歸於無形而有化不化不化者與天地俱生而有生不生前之九守後之守樸則是一變爲九而十復爲一夫是之謂與造物者游通玄眞經纉義卷之三
