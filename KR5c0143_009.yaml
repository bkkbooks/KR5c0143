front:
  text: 通玄真經纘義卷之九非九
  hash: sha256:b4978ff2f9540759ef73fa933f772fe4d45f1c407cd32f542d8bdcbad2f601a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0143_HFL_009-001a, image: hfl/0524/0524-068.png}
body:
  text: 南谷子杜道堅纂下德篇老子曰治身太上養神其次養形神清意平百節皆寧養生之本也肥肌膚充腹腸開嗜欲養生之末也治國太上養化其次正法民交讓爭處卑財利爭受少事力爭就勞日化上而遷善不知其所以然治之本也利賞而勸善畏刑而不敢為非法令正於上百姓服於下治之末也上世養本而下世事末下德執德也太上養神治身之本也其次養形治身之末也大上養化治國之本也其次正法治國之末也降此而下則又下德之下者焉老子曰欲治之主不世出可與治之臣不萬一以不世出求不萬一此至治所以千歲不一也霸王之功不世立也順其善意防其袤心與民同出一道則民可善風俗可美所貴聖人者非貴其隨罪而作刑也貴其知亂之所生也若開其鋭端而從之放僻淫泆而棄之以法隨之以刑雖殘賊天下不能禁其姦矣明良會合千載一逢夫明君不世出良臣不萬一以不世之君得萬一之臣唐虞而下若成湯之於伊尹文王之於吕望世不多見如齊桓之管仲亦不世出是以治日少而亂日多抑由君子少而小人多歟老子曰身處江湖之上心在魏闕之下即重生重生即輕利矣猶不能自勝即從之神無所害也不能自勝而強不從是謂重傷重傷之人無壽類矣故曰知和曰常知常曰明益生曰祥心使氣曰強是謂玄同用其光復歸其明人有仕隱道無屈伸夫身江湖而心魏闕畎畝不忘也是故有道之士隱以此道任以此道時止則止時行則行夫是之謂玄同老子曰天下莫易於為善莫難於為不善所謂為善易者靜而無為適情辭餘無所誘惑循性保真無變於己故曰為善易也所謂為不善難者篡弒驕淫躁而多欲非人之性也故曰為不善難也今之以為大患者由無常厭度量生也故利害之地禍福之際不可不察聖人無欲也無避也事或欲之適足以失之事或避之適足以就之志有所欲即忘其所為矣是以聖人審動靜之變適授與之度理好憎之情和喜怒之節夫動靜得即患不侵也授與適即罪不纍也理好憎即憂不近也和喜怒即怨不犯矣善惡異迹同出於心天下莫易於為善莫難於為不善禍福之階事不可必欲得而反失之欲避而反就之是以聖人審動靜之變和喜怒之節事無不善何憂怨之有體道之人不苟得不讓禍其有不棄非其有不制恆滿而不溢常虛而易贍故自當以道術度量即食充虛衣圉寒足溫飽七尺之形無道術度量而以自要尊貴即萬乘之勢不足以為快天下之富不足以為樂故聖人心平志易精神內守物不能惑修身有道處世有術夫體道之人守其天常安其命義食止充虛衣止禦寒不茍所得不棄所有禍不幸免福不妄就達不自驕窮不易操樂乎天真與道同久老子曰勝人者有力自勝者強能強者必用人力者也能用人力者必得人心者也能得人心者必自得者也未有得己而失人者也未有失己而得人者也故為治之本務在安民安民之本在於足用足用之本在於不奪時不奪時之本在於省事省事之本在於節用節用之本在於去驕去驕之本在於虛無故達生之情者不務生之所無以為達命之情者不務知之所無奈何目説五色口惟滋味耳淫五聲七竅交爭以害一性日引袤欲竭其天和身且不能治奈治天下何將勝乎人先勝乎己未有己不勝而能勝人者也勝人者有力欲勝理也自勝者強理勝欲也理勝則得人之心人將自用其力欲勝則用人之力人將先離其心天理人欲之異宜有間然所謂得天下者非謂其履勢位稱尊號言其運天下心得天下力也有南面之名無一人之譽此失天下也故桀紂不為王湯武不為放故天子得道守在四夷天子失道守在諸侯諸侯得道守在四境諸侯失道守在左右故曰無恃其不吾奪也恃吾不可奪也行可奪之道而非篡弒之行無益於持天下矣撫我則后虐我則讎聖人運天下心得天下力而天下治若夫桀紂之為君有南面之名無一人之譽此湯武之所以不為之臣天下失道諸侯為守誰之過歟老子曰善治國者不變其故不易其常夫怒者逆德也兵者凶器也爭者人之所亂也陰謀逆德好用凶器治人之亂逆之至也非禍人不能成禍不如銼其鋭解其紛和其光同其塵人之性情皆願賢己而疾不及人願賢己則爭心生疾不及人則怨爭生怨爭生則心亂而氣逆故古之聖王退爭怨爭怨不生則心治而氣順故曰不尚賢使民不爭爭之不足讓之有餘人已兩全之道也夫怒逆德兵凶器爭者人之所亂陰謀逆德好用凶器治人之亂逆之至也文子以其言而授之范蠡越欲伐吳蠡引以為諫勾踐不聽敗于夫椒則知欲禍人者乃所以自禍也賢者肯如是乎老子曰治物者不以物以和治和者不以和以人治人者不以人以君治君者不以君以欲治欲者不以欲以性治性者不以性以德治德者不以德以道以道本之性無袤穢久湛於物即忘其本而合於若性衣食禮俗者非人之性也所受於外也故人性欲平嗜欲害之唯有道者能遺物反已有以自鑒則不失物之情無以自鑒即動而惑營夫縱欲失性動未嘗正以治生即失身以治國即亂人故不聞道者無以反性性與欲固有間矣人皆然君惟甚夫治物不以物以和者先明己之性而後明物之性明物之性則可以贊化育參天地矣古者聖人能得諸己故令行禁止凡舉事者必先平意清神神清意平物乃可正聽失於非譽目淫於彩色而欲得事正即難矣是以貴虛故水激而波起氣亂則志昏昏智不可以為正波水不可以為平故聖王執一以理物之情性夫一者至貴無敵於天下聖王託於無適故為天下命古之學者為己為己之道立而後為人之道行聖人得諸己故清明在躬無遠弗燭得萬物之情而命令行於天下矣老子曰陰陽陶冶萬物皆乘一氣而生上下離心氣乃上蒸君臣不和五穀不登春肅秋榮冬雷夏霜皆賊氣之所生也天地之間一人之身也六合之內一人之形也故明於性者天地不能脅也審於符者怪物不能惑也聖人由近知遠以萬異為一同氣蒸乎天地禮義廉恥不設萬民不相侵暴虐由在乎混冥之中也廉恥陵遲及至世之衰用多而財寡事力勞而養不足民貧苦而忿爭生是以貴仁人鄙不齊比周朋黨各推其與懷機械巧詐之心是以貴義男女羣居雜而無别是以貴禮性命之情淫而相迫於不得已即不和是以貴樂故仁義禮樂者所以救殘也非通治之道也天地一身天下一氣陽變陰化陶冶萬物皆乘一氣而生聖人愛養萬民視為一家故天下和平也若乃用多而財寡事力勞而養不足則民貧苦而忿爭生非通治之道矣誠能使神明定於天下而心反其初即民性善民性善即天下陰陽從而包之是以財足而人贍貪鄙忿爭之心不得生焉仁義不用而道德定於天下而民不淫於彩色故德衰然後飾仁義和失然後調聲禮淫然後飾容故知道德然後知仁義不足行也知仁義然後知禮樂不足修也聖人誠而明之反其性初民復於善民性善則天地陰陽從而包之財足人贍食鄙不生忿爭乃息仁義不用而道德定於天下矣老子曰清靜之治者和順以寂寞質真而素朴間靜而不躁在內而合乎道出外而同乎義其言略而循理其行説而順情其心和而不偽其事素而不飾不謀所始不議所終安即留激即行通體乎天地同精乎陰陽一和乎四時明朗乎日月與道化者為人機巧詐偽莫載乎心是以天覆以德地載以樂四時不失敘風雨不為虐日月清靜而揚光五星不失其行此清靜之所明也天清地靜故能長久聖人以清靜為治者法天地也心清則內合乎道體靜則外同乎人是以不出户而化行老子曰治世之職易守也其事易為也其禮易行也其責易償也是以人不兼官官不兼事農士工商鄉别州異故農與農言藏士與士言行工與工言巧商與商言數是以士無遺行工無苦窳農無廢功商無折貨各安其性異形殊類易事而不悖失業而賤得志而貴古人世守一官官守一事故治世之臣職易守事易為後世兼官共事之法行官益冗而吏益繁政出多門反致害治夫先知遠見之人才之盛也而治世不以責於民博文強志口辨辭給人知之溢也而明主不求於下敖世賤物不從流俗士之伉行也而治世不以為化民故高不可及者不以為人量行不可逮者不以為國俗故人才不可專用而度量道術可世傳也故國法可與愚守也而軍旅可以法同也不待古之英雋而人自足者因其所有而並用之也末世之法高為量而罪不及也重為任而罰不勝也危為難而誅不敢也民困於三責即飾智而詐上犯袤而行危雖峻法嚴刑不能禁其姦獸窮即觸鳥窮即啄人窮即詐此之謂也才不可以勝德言不可以過行才盛而有先知之見者治世不以責於人聞博而有辨口之佞者明主不以求於下傲世伉行責人以重難強人以不能者惡免人窮之詐哉老子曰雷霆之聲可以鍾鼓象也風雨之變可以音律知也大可睹者可得而量也明可見者可得而蔽也聲可聞者可得而調也色可察者可得而别也夫至大天地不能函也至微神明不能領也及至建律曆别五色異清濁味甘苦即朴散而為器也立仁義修禮樂即德遷而為偽矣民飾智以驚愚設詐以攻上天下有能持之而未能有治之者也夫智能彌多而德滋衰是以至人淳朴而不散聖人剖大朴法天地觀象以制器若雷霆之於鍾鼓風雨之於音律皆得象而為之至若天地之大神明之微則有所不能盡究也惟至人淳朴不散而可以為萬世之師老子曰夫至人之治虛無寂寞不見可欲心與神處形與性調靜而體得動而理通循自然之道緣不得己矣漠然無為而天下和淡然無欲而民自朴不忿爭而財足施者不德受者不讓德反歸焉而莫之惠不言之辨不道之道若或通焉謂之天府取焉而不損酌焉而不竭莫知其所由出謂之搖光搖光者資糧萬物者也北辰天之尊帝也端居天心而衆星拱之至人取法為冶心與神處漠然無為而天下和搖光居北斗之杓資糧萬物隨天左旋日轉一周斗不降祿生民罔食舜察璇璣以齊七政其知天矣乎老子曰天愛其精地愛其平人愛其情天之精日月星辰雷霆風雨也地之平水火金木土也人之情思慮聰明喜怒也故閉四關正五道即與道淪神明藏於無形精氣反於真目明而不以視耳聰而不以聽口當而不以言心條通而不以恩慮委而不為知而不矜直性命之情而知故不可害精存於目即其視明存於耳即其聽聰留於口即其言當集於心即其慮通故閉四關即終身無患四支九竅莫死莫生是謂真人地之生財大本不過五行聖人節五行即治不荒人有五性應天五星應地五行五性動而七情出身可不知愛乎夫神藏於心精藏於腎魂藏於肝魄藏於肺意藏於脾神明藏於無形莫生莫死是謂真人老子曰衡之於左右無私輕重故可以為平繩之於內外無私曲直故有以為正人主之於法無私好憎故可以為令德無所立怨無所藏是任道而合人心者也故為冶者知不與焉水戾破舟木擊折軸不怨木石而罪巧拙者智不載也故道有智則亂德有心則險心有眼則眩夫權衡規矩一定而不易常一而不袤方行而不留一日形之萬世傳之無為之為也一者無為也百王用之萬世傳之為而不易也人有私心罔不害道人主無私故法一而令行是故德有心則險心有眼則眩知權衡規矩一定而不易則知一者無為之為百王用之萬世傳之老子曰人之言曰國有亡主世無亡道人有窮而理無不通故無為者道之宗得道之宗並應無窮也故不因道理之數而專己之能其窮不遠也夫人君不出户而知天下者因物以識物因人以知人故積力之所舉即無不勝也衆智之所為即無不成也千人之衆無絶糧萬人之羣無廢功工無異伎士無兼官各守其職不得相干人得所宜物得所安是以器械不惡職事不慢也夫債少易償職寡易守也任輕易勸也上操約少之分下效易為之功是以君臣不相厭也天不自天有為天者地不自地有為地者為者其誰耶國有亡主世無亡道伊尹五就桀而不用是專己之能而不知因人之道也故伊尹不為夏而為湯矣夏其有不亡湯其有不興乎老子曰帝者體太一王者法陰陽霸者則四時君者用六律體太一者明天地之情通道德之倫聰明照於日月精神通於萬物動靜調於陰陽喜怒和於四時覆露皆道並貺而無私蜎飛蠕動莫不仰德而生德流方外名聲傳於後世法陰陽者承天地之和德與天地參光明與日月並照精神與鬼神齊靈戴圓履方抱表寢繩內能冶身外得人心發號施令天下風從則四時者春生夏長秋收冬藏取與有節出入有量喜怒剛柔不離其理柔而不脆剛而不壯寬而不肆肅而不悖優柔委順以養羣類其德含愚而容不肖無所私愛也用六律者生之與殺也賞之與罰也與之與奪也非此無道也伐亂禁暴興賢良廢不肖匡袤以為正攘險以為平矯枉以為直明施舍開塞之道乘時因勢以服役人心者也帝者不體陰陽即侵王者不法四時即削霸者不用六律即辱君者失準繩即廢故小而行大即窮塞而不親大而行小即狹隘而不容不曰皇而曰帝曰王曰霸曰君何哉尊皇也帝者失道而後德王者失德而後仁霸者失仁而後義君者失義而後禮大者立則小者在焉小者立則大者失矣老子曰地廣民衆不足以為強甲堅兵利不可以恃勝城高池深不足以為固嚴刑峻法不足以為威為存政者雖小必存為亡政者雖大必亡故善守者無與禦善戰者無與鬥乘時勢因民欲而取天下故善為政者積其德善用兵者畜其怒德積而民可用也怒畜而威可立也故文之所加者深權之所服者大德之所施者博威之所制者廣廣則我強而敵弱善用兵者先弱敵而後戰故費不半而功十倍千乘之國行文德者王萬乘之國好用兵者亡王兵先勝而後戰敗兵先戰而後求勝此不明於道也行文德者雖小必存好用兵者雖大必亡夫善為政者積其德善用兵者畜其怒惟知兵本以止亂而不以為亂則民不傷而國長存通玄真經纘義卷之九
