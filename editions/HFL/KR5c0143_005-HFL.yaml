front:
  text: 通玄眞經纘義卷之五非五
  hash: sha256:1b9db8d46ff0460328a4c5849a787ddb2d76cedb9a1fa7b05eb11df3550eb427
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0143_HFL_005-001a, image: hfl/0523/0523-152.png}
body:
  text: 南谷子杜道堅纂道德篇文子問道老子曰學問不精聽道不深凡聽者將以達智也將以成行也將以致功名也不精不明不深不達故上學以神聽中學以心聽下學以耳聽以耳聽者學在皮膚以心聽者學在肌肉以神聽者學在骨髓故聽之不深即知之不明知之不明即不能盡其精不能盡其精即行之不成凡聽之理虚心清靜損氣無盛無思無慮目無妄視耳無苟聽專精積蓄内意盈并既已得之必固守之必長乆之天性即道性善即德道德之在我者也故聖人不學而知率之謂道修之謂教則是以在於我者施於人矣中人以上中人以下皆得而學之聽乎耳悦乎心如鏡得磨光明内發豈非吾心之固有乎因其學而明之以之修身則道德著以之治國則事業成此以見學問之精而吾心之明夫道者原産有始始於柔弱成於剛强始於短寡成於衆長十圍之木始於杞百仞之臺始於下此天之道也聖人法之卑者所以自下也退者所以自後也儉者所以自小也損者所以自少也卑則尊退則先儉則廣損則大此天道所以成也氣形道德之體用乎氣乃無形之物物乃有形之炁炁無形故柔弱物有形故剛强則知炁者形之始也道生德畜由微至著聖人法之體立用行天道成矣夫道者德之元天之根福之門萬物待之而生待之而成待之而寧夫道無爲無形内以修身外以治人功成事立與天爲鄰無爲而無不爲莫知其情莫知其眞其中有信天子有道則天下服長有社稷公侯有道則人民和睦不失其國士庶有道則全其身保其親强大有道不戰而剋小弱有道不爭而得舉事有道功成得福君臣有道即忠惠父子有道即慈孝士庶有道即相愛故有道即和無道即苛由是觀之道之於人無所不宜也道德根于心精神著乎外功成事立與天爲鄰自天子至於庶人有道則亨無道則屯夫道者小行之小得福大行之大得福盡行之天下服服則懷之故帝者天下之適也王者天下之往也天下不適不往不可謂帝王故帝王不得人不能成得人失道亦不能守夫失道者奢泰驕佚慢倨矜傲見餘自顯自明執雄堅强作難結怨爲兵主爲亂首小人行之身受大殃大人行之國家滅亡淺及其身深及子孫故罪莫大於無道怨莫深於無德天道然也身之本在德德之本在道無小無大行則得之天下服之服則懷之帝適也王往也天下適往是謂帝王然得人則成有道則守無爲兵主無爲亂首失道則亂失德則怨天道然耳老子曰夫行道者使人雖勇刺之不入雖巧擊之不中夫刺之不入擊之不中而猶辱也未若使人雖勇不敢刺雖巧不敢擊夫不敢者非無其意也未若使人無其意夫無其意者未有愛利之心也若使天下丈夫女子莫不懽然皆欲愛利之若然者無地而爲君無官而爲長天下莫不願安利之道非有心於應物而物自應之夫刺擊不傷未若懽然皆有愛利之心雖無地而人君之無官而人長之天下莫不願安利之古之人有庚桑子者其德似之文子問德老子曰畜之養之遂之長之兼利無擇與天地合此之謂德何謂仁曰爲上不矜其功爲下不羞其病於大不矜於小不偷兼愛無私乆而不衰此之謂仁也何謂義曰爲上即輔弱爲下即守節達不肆意窮不易操一度順理不私枉撓此之謂義也何謂禮曰爲上即恭嚴爲下即卑敬退讓守柔爲天下雌立於不敢設於不能此之謂禮也故修其德則下從令修其仁則下不爭修其義即下平正修其禮則下尊敬四者既修國家安寧故物生者道也長者德也愛者仁也正者義也敬者禮也不畜不養不能遂長不慈不愛不能成遂不正不匡不能乆長不敬不寵不能貴重故德者民之所貴也仁者民之所懷也義者民之所畏也禮者民之所敬也此四者文之順也聖人之所以御萬物也君子無德即下怨無仁即下爭無義即下暴無禮即下亂四經不立謂之無道無道不亡者未之有也德者五常之總名有德之人五常備焉仁則慈義則宜禮則敬知則明信則實有之是謂五常一曰五德君子未有無德而能爲國家者矣文子之問爲天下後世發也其德博哉老子曰至德之世賈便於市農樂於野大夫安其職處士修其道人民樂其業是以風雨不毁折草木不夭死河出圖洛出書及世之衰也賦斂無度殺戮無止刑諫者殺賢士是以山崩川涸蝡動不息野無百蔬故世治則愚者不得獨亂世亂則賢者不能獨治故聖人和愉寧靜生也志得道行命也故生遭命而後能行命得時而後能明必有其世而後有其人天之視人猶父之視子其愛均也君者天之元子民天之赤子上不恤下天必示儆夫至德之世愛均合天萬物遂長民樂其業世之衰也苛政干和天怒震發地見其災國家多難流毒民人惟聖人和愉寧靜志得道行民物遂生是之謂有其世而後有其人文子問聖智老子曰聞而知之聖也見而知之智也故聖人常聞禍福所生而擇其道智者常見禍福成形而擇其行聖人知天道吉凶故知禍福所生智者先見成形故知禍福之門聞未生聖也先見成形智也無聞見者愚迷也聖不曰生知而曰聞知何哉生知道在我者也聞知事在外者也聖人聞於未然禍福先知智則必待事成而後見愚則溺於聞見終不自知迷亦甚矣老子曰君好知即信時而任己棄數而用惠物博智淺以淺贍博未之有也獨任其智失必多矣好智窮術也好勇危亡之道也好與則無定分上之分不定即下之望無止若多斂即與民爲讎少取而多與其數無有故好與來怨之道也由是觀之財不足任道術可因明矣智者不爲其所不能爲强所不能則非智矣然則智可好乎好智則術易窮好與則分不定多歛民讎來怨之媒也文子問曰古之王者以道蒞天下爲之柰何老子曰執一無爲因天地與之變化天下大器不可執也不可爲也爲者敗之執者失之執一者見小也見小故能成大也無爲者守靜也守靜故能爲天下正處大滿而不溢居高貴而無驕處大不溢盈而不虧居上不驕高而不危盈而不虧所以長守富也高而不危所以長守貴也富貴不離其身禄及子孫古之王道期於此矣以道蒞天下曰執一無爲何哉一則定矣是以古之王者因天地之變化無爲而治見小不棄守靜不爲大器安而天下正矣是故處大不溢居上不驕富貴可守子孫可乆老子曰民有道所同行有法所同守義不能相固威不能相必故立君以一之君執一即治無常即亂君道者非所以有爲也所以無爲也智者不以德爲事勇者不以力爲暴仁者不以位爲惠可謂一矣一也者無適之道也萬物之本也君數易法國數易君人以其位達其好憎下之任懼不可勝理故君失一基亂甚於無君也君必執一而後能羣矣天下雖大君以一之君一則道不待爲民所同行法不待變民所同守智不以德勇不以力仁不以惠合而一之君之道也若夫君數易法國數易君則甚於無君也矣文子問曰王道有幾老子曰一而已矣文子曰古有以道王者有以兵王者何其不一也曰以道王者德也以兵王者亦德也用兵有五有義兵有應兵有忿兵有貪兵有驕兵誅暴救弱謂之義敵來加己不得已而用之謂之應爭小故不勝其心謂之忿利人土地欲人財貨謂之貪恃其國家之大矜其人民之衆欲見賢於敵國者謂之驕義兵王應兵勝忿兵敗貪兵死驕兵滅此天之道也道爲治本君以道王本喪亂生兵革興焉然則古者有以道王有以兵王雖若不同而同歸于有德故五兵之用唯義兵可王是雖兵亦道也故曰一而已矣其應兵勝忿兵敗貪兵死驕兵滅此戰國之事非王者之兵也老子曰釋道而任智者危棄數而用才者困故守分循理失之不憂得之不喜成者非所爲也得者非所求也入者有受而無取出者有授而無與因春而生因秋而殺所生不德所殺不怨即幾於道矣道在乎治數關於時任智釋道用才棄數危困之階也惟守分循理得不喜成失不憂退物之入者有受無取物之出者有授無與因時而行生不爲德殺不爲怨則近乎道矣文子間曰王者得其懽心爲之柰何老子曰若江海即是也淡兮無味用之不既先小而後大夫欲上人者必以其言下之欲先人者必以其身後之天下必效其懽愛進其仁義而無苛氣居上而民不重居前而衆不害天下樂推而不厭雖絶國殊俗蜎飛蝡動莫不親愛無之而不通無往而不遂故爲天下貴江海善下而有容故百川歸之王者法之以爲治容民畜衆故得百姓之懽心樂共推戴天下歸往矣草木昆蟲亦將欣服其貴可知老子曰執一世之法籍以非傳代之俗譬猶膠柱調瑟聖人者應時權變見形施宜世異則事變時移則俗易論世立法隨時舉事上古之王法度不同非故相反也時務異也是故不法其己成之法而法其所以爲法者與化推移聖人法之可觀也其所以作法不可原也其言可聽也其所以言不可形也三皇五帝輕天下細萬物齊死生同變化抱道推誠以鏡萬物之情上與道爲友下以化爲人今欲學其道不得其清明玄聖守其法籍行其憲令必不能以爲治矣一炁運行四時更變有不容不爾者天道然也皇帝王伯之治不同者若出人爲實由天運故不可執一世之法籍而爲傳代之治惟隨時而舉事隨事而應變則可以論世立法如冬不可葛夏不可裘知天道者能之文子問政老子曰御之以道養之以德無示以賢無加以力損而執一無處可利無見可欲方而不割廉而不劌無矜無伐御之以道則民附養之以德則民服無示以賢則民足無加以力則民樸無示以賢者斂也無加以力不敢也下以聚之賂以取之儉以自全不敢自安不下即離散弗養即背叛示以賢即民爭加以力即民怨民離散即國勢衰民背叛即上無威人爭則輕爲非下怨其上即位危四者誠修正道幾矣古人以道德爲政後世以功力爲政以道德則民服而風俗淳以功力則民怨而戰爭起故御之以道養之以德無示以賢無加以力則無爲而天下治矣老子曰上言者下用也下言者上用也上言者常用也下言者權用也唯聖人爲能知權言而必信期而必當天下之高行直而證父信而死女孰能貴之故聖人論事之曲直與之屈伸無常儀表祝即名君溺即捽父勢使然也夫權者聖人所以獨見夫先迕而後合者之謂權先合而後迕者不知權不知權者善反醜矣上言下用經者權之體也下言上用權者經之用也經權相濟事無不宜唯聖人知權言而必信期而必當與之屈伸而審其迕合若夫執中無權則不能隨時而適變膠柱鼔瑟善反醜矣文子問曰夫子之言非道德無以治天下也上世之王繼嗣因業亦有無道各没其世而無禍敗者何道以然老子曰自天子至于庶人各自生活然其活有厚薄天下時有亡國破家無道德之故也有道德則夙夜不懈戰戰兢兢常恐危亡無道德則縱欲怠惰其亡無時使桀紂修道行德湯武雖賢無所建其功也夫道德者所以相生養也所以相畜長也所以相親愛也所以相敬貴也夫聾蟲雖愚不害其所愛誠使天下之民皆懷仁愛之心禍災何由生乎夫無道而無禍害者仁未絶義未滅也仁雖未絶義雖未滅諸侯已輕其上矣諸侯輕上則朝廷不恭縱令不順仁絶義滅諸侯背叛衆人力政强者陵弱大者侵小民人以攻擊爲業災害生禍亂作其亡無日何期無禍也古之治天下者道德衰而仁義次之仁義衰則禍亂作戰爭興焉上世嗣王如桀紂之主國未云亡諸侯已有輕上之心則道德喪而仁義衰矣故湯武起而夏商絶若周之幽厲視桀紂才一間耳故不免大戎之殺驪山之死諸侯力政强陵弱大侵小六國從衡與周俱亡可不鑑乎老子曰法煩刑峻即民生詐上多事則下多態求多即得寡禁多則勝少以事生事又以事止事譬猶揚火而欲使無焚也以智生患又以智備之譬猶撓水而欲求其清也法本以求治煩則生亂刑本以禁奸峻則興詐夫上多事而欲民無事者是猶强之飲而責其醉也則是罔民也矣安可云治乎老子曰人主好仁即無功者賞有罪者釋好刑即有功者廢無罪者及無好憎者誅而無怨施而不德放準循繩身無與事若天若地何不覆載合而和之君也别而誅之法也民以受誅無所怨憾謂之道德好仁而不知爲政賞及無功釋及有罪猶能害政好刑而不知爲法廢及有功誅及無罪其害深矣惟至公不偏合於道德賞不致濫刑不致酷則百官盡職萬民服業天下隆平老子曰天下是非無所定世各是其所喜而非其所惡夫求是者非求道理也求合於己者也去非者非去袤也去逆於心者也今吾欲擇是而居之擇非而去之不知世之所謂是非者也故治大國若烹小鮮曰勿撓而已夫趣合者即言中而益親身疏而謀當即見疑今吾欲正身而待物何知世之所從規我者乎吾若與俗遽走猶逃雨也無之而不濡欲在於虛則不能虛若夫不爲虛而自虛者此所欲而無不致也故通於道者如車軸不運於己而與轂致于千里轉於無窮之原也故聖人體道反至不化以待化動而無爲也名分法理辯是非别善惡之道也不求公道而自取己見以是爲非以惡爲善而望名分正法理明難矣惟正身待物不廢公道猶車行陸舟行水無往而不通惡有陷於不平者哉老子曰夫亟戰而數勝者則國必亡亟戰則民罷數勝則主驕以驕主使罷民而國不亡者寡矣主驕則恣恣則極物民罷則怨怨則極慮上下俱極而不亡者未之有也故功遂身退天之道也兵不常勝敗亦隨之反覆之道也惡可亟戰而求數勝哉主勝而驕民罷而戰伐國之斧矣兵猶火也不戢將自焚其是之謂歟平王問文子曰吾聞子得道於老聃今賢人雖有道而遭淫亂之世以一人之權而欲化乆亂之民其庸能乎文子曰夫道德者匡袤以爲正振亂以爲治化淫敗以爲樸醇德復生天下安寧要在一人人主者民之師也上者下之儀也上美之則下食之上有道德即下有仁義下有仁義即無淫亂之世矣積德成王積怨成亡積石成山積水成海不積而能成者未之有也積道德者天與之地助之鬼神輔之鳳鳥翔其庭麒麟游其郊蛟龍宿其沼故以道蒞天下天下之德也無道蒞天下天下之賊也以一人與天下爲讎雖欲長乆不可得也堯舜以是昌桀紂以是亡平王曰寡人敬聞命矣文子家睢與亳爲鄰乆師老子聞道故博平王聘而問道文子對以積德成王積怨成亡堯舜以是昌桀紂以是亡平王曰寡人敬聞命矣以是觀之平王若有志於爲治者也何不能修德釋怨而乃信讒懷疑輒誅伍氏此文子所以去楚而適越也子胥勸吴伐楚遂致鞭尸之辱甚矣有國者怨其可不釋乎通玄眞經纉義卷之五
