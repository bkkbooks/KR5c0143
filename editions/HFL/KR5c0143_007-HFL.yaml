body:
  text: 南谷子杜道堅纂微明篇老子曰道可以弱可以强可以柔可以剛可以陰可以陽可以幽可以明可以包裹天地可以應待無方知之淺不知之深知之外不知之内知之粗不知之精知之乃不知不知乃知之孰知知之爲不知不知之爲知乎夫道不可聞聞而非也道不可見見而非也道不可言言而非也孰知形之不形者乎故天下皆知善之爲善也斯不善矣知者不言言者不知微明者其道乎視不以目聽不以耳得之天而著之心故能包裹天地應待無方不可以智知力求惟知不知爲不爲言不言則得之矣文子問曰人可以微言乎老子曰何爲不可唯知言之謂乎夫知言之謂者不以言言也爭魚者濡逐獸者趨非樂之也故至言去言至爲去爲淺知之人所爭者末矣言有宗事有君夫唯無知是以不吾知道不可言可言即物言固非道非言不明文子問人可以微言乎老子語以唯知言爲可則是言而不言不言而言者矣爭魚逐獸是不知言者執於言而著於物則所爭者末矣安得去言去爲之人而與之言哉文子問曰爲國亦有法乎老子曰今夫挽車者前呼邪軤後亦應之此挽車勸力之歌也雖鄭衛胡楚之音不若此之義也治國有禮不在文辯法令滋章盜賊多有有國家者猶天地也天不言而四時行地不語而百物生文子問爲國之法老子語以挽車之歌前呼後應亦猶聖人先天弗違後天奉時之意治國有禮初不在於文華之辯不知治體而滋章其法令者適以爲盜法賊民之資老子曰道無正而可以爲正譬若山林而可以爲材材不及山林山林不及雲雨雲雨不及陰陽陰陽不及和和不及道道者所謂無狀之狀無物之象也無達其意天地之間可陶冶而變化也道無正形物隨而形觀山林變而至於雲雨陰陽之和則知凡天地間之無形無象者皆可陶冶而變化道其神矣夫老子曰聖人立教施政必察其終始見其造恩故民知書即德衰知數而仁衰知劵契而信衰知機械而實衰瑟不鳴而二十五弦各以其聲應軸不運於己而三十輻各以其力旋弦有緩急然後能成曲車有勞佚然後能致遠使有聲者乃無聲也使有轉者乃無轉也上下異道易治即亂位高而道大者從事大而道小者凶小德害義小善害道小辯害治苛悄傷德大正不險故民易導至治優游故下不賊至忠復素故民無僞匿聖人立教施政弗獲己也必察其始終行其所無事而已知書數劵契機械則是有心於事德仁信實衰矣君藉臣以爲治猶瑟之有聲輻之致遠執要用大則無不治之世矣老子曰相坐之法立即百姓怨减爵之令張即功臣叛故察於刀筆之迹者不知治亂之本習於行陣之事者不知廟戰之權聖人見福於重關之内慮患於冥冥之外愚者惑於小利而忘大害故事有利於小而害於大得於此而忘於彼故仁莫大於愛人智莫大於知人愛人即無怨刑知人即無亂政治不可以多事法不可以數變事多變數則百姓怨功臣叛上有以召之矣治亂之本廟戰之權聖人玄鑒於無形之表是必有先見之明也老子曰江河之大溢不過三日飄風暴雨日中不出須臾止德無所積而不憂者亡其及也夫憂者所以昌也喜者所以亡也故善者以弱爲强轉禍爲福道冲而用之又不滿也國之苛政横出猶江河之大溢風雨之暴作曾不少乆亡其及矣惟憂無德而知變者尚可轉禍爲福以弱爲强其不可自滿也明矣老子曰清靜恬和人之性也儀表規矩事之制也知人之性即自養不悖知事之制則其舉措不亂發一號散無競總一管謂之心見本而知末執一而應萬謂之術居知所以行知所之事知所乗動知所止謂之道使人高賢偁譽己者心之力也使人卑下誹謗己者心之過也言出於口不可禁於人行發於近不可禁於遠事者難成易敗名者難立易廢凡人皆輕小害易微事以至於大患夫禍之至也人自生之福之來也人自成之禍與福同門利與害同鄰自非至精莫之能分是故智慮者禍福之門户也動靜者利害之樞機也不可不愼察也天理人欲同乎一心君子小人由乎一己亦同出而異名者耶執一而應萬謂之術見動而知止謂之道言出乎口行發乎心夫禍福利害有如影響自非至精孰能分之可不察諸己而愼諸心乎老子曰人皆知治亂之機而莫知全生之具故聖人論世而爲之事推事而爲之謀聖人能陰能陽能柔能剛能弱能强隨時動靜因資而立功睹物往而知其反事一而察其變化即爲之象運則爲之應是以終身行之無所困故事或可言而不可行者或可行而不可言者或易爲而難成者或難成而易敗者所謂可行而不可言者取捨也可言而不可行者僞詐也易爲而難成者事也難成而易敗者名也此四者聖人之所留心也明者之所獨見也時有治亂政存乎人知治亂之機而莫知全生之具者失在人而不在時也聖人隨時動靜察其所變終身行之而無所困當時而秉政者惡可自隋而不知全生之具耶老子曰道者敬小微動不失時百射重戒禍乃不滋計福不及慮禍過之同日被霜蔽者不傷愚者有備與智者同功夫積愛成福積憎成禍人皆知救患莫知使患無生夫使患無生易施於救患難今人不務使患無生而務施救於患雖神人不能爲謀患禍之所由來萬萬無方聖人深居以避患靜默以待時小人不知禍福之門動而陷於刑雖曲爲之備不足以全身故上士先避患而後就利先遠辱而後求名故聖人常從事於無形之外而不留心於已成之内是以禍患無由至非譽不能塵垢夫道者敬小微動不失時謹初也愚者有備與智者同功人之禍患不能弭於前而求救於後者雖神人不能爲謀故上士以避患遠辱爲先而名之與利則置之後而毋必禍患何從而至非譽何從而塵垢之哉老子曰凡人之道心欲小志欲大智欲圓行欲方能欲多事欲少所謂心小者慮患未生戒禍愼微不敢縱其欲也志大者兼包萬國一齊殊俗是非輻輳中爲之轂也智圓者終始無端方流四遠淵而不竭也行方者立直而不撓素白而不汙窮不易操達不肆志也能多者文武備具動靜中儀舉措廢置曲得其宜也事少者秉要以偶衆執約以治廣處靜以持躁也故心小者禁於微也志大者無不懷也智圓者無不知也行方者有不爲也能多者無不治也事少者約所持也故聖人之於善也無小而不行其於過也無微而不改行不用巫覡而鬼神不敢先可謂至貴矣然而戰戰慄慄日愼一日是以無爲而一之誠也愚人之智固已少矣而所爲之事又多故動必窮故以正教化其勢易而必成以袤教化其勢難而必敗舍其易而必成從事於難而必敗愚惑之所致志欲大而心欲小智欲圓而行欲方能欲多而事欲少斯六者凡人之不可不勉也志大則物無不容心小則幾微必戒智圓則事無不通行方則直而不撓能多則爲無不成事少則約而有守夫聖人之行不用巫覡而鬼神不敢先一之以誠而已老子曰福之起也縣縣禍之生也紛紛禍福之數微而不可見聖人見其始終故不可不察明主之賞罰非以爲己以爲國也適於己而無功於國者不施賞焉逆於己而便於國者不加罰焉故羲載乎宜謂之君子遺義之宜謂之小人通智得而不勞其次勞而不病其下病而益勞古之人味而不舍也今之人舍而不味也紂爲象箸而箕子啼魯以偶人葬而孔子歎見其所始即知其所終禍福之機有開必先可不察歟賞罰人主之大柄非以爲己以爲國也君子小人有義利之間治而不勞政之上也勞而不病政之次也病而益勞政斯下矣夫箕子之泣象箸孔子之歎偶人國有不待終而知其亡老子曰仁者人之所慕也義者人之所高也爲人所慕爲人所高或身死國亡者不周於時也故知仁義而不知世權者不達於道也五帝貴德三王用義五伯任力今取帝王之道施五伯之世非其道也故善否同非譽在俗趨行等逆順在時知天之所爲知人之所行即有以經於世矣知天而不知人即無以與俗交知人而不知天無以與道游直志適情即堅强賊之以身役物即陰陽食之道之不行也我知之矣時異故也五帝貴德三王用義五伯任力當五伯之世而施帝王之道者不知於時也不知時則是不知天不知人矣何以經於世哉得道之人外化而内不化外化所以知人也内不化所以全身也故内有定一之操而外能屈伸與物推移萬舉而不陷所貴乎道者貴其龍變也守一節推一行雖以成滿猶不易拘於小好而塞於大道道者寂寞以虚無非有爲於物也不以有爲於己也是故舉事而順道者非道者之所爲道之所施也龍虎變化大人之道也得道之人與物推移而不陷是故老子有猶龍之稱夫體道虚無外不有於物内不有於己道無不施天下化矣天地之所覆載日月之所照明陰陽之所煦雨露之所潤道德之所扶皆同一和也是故能戴大圓者履大方鏡太清者視大明立太平者處大堂能游於冥冥者與日月同光無形而生於有形是故眞人託期於靈臺而歸居於物之初視於冥冥聽於無聲冥冥之中獨有曉焉寂寞之中獨有照焉其用之乃不用不用而後能用之也其知之乃不知不知而後能知之也和也者天下之達道也天之覆地之載同乎一和而已王者戴圓履方處大堂而立太平者和其可失乎眞人歸居於物之初必有獨見於冥冥之中是故用有不用而後能用知有不知而後能知夫是之謂大和道者物之所道也德者生之所扶也仁者積恩之證也義者比於心而合於衆適者也道滅而德興德衰而仁義生故上世道而不德中世守德而不懷下世繩繩而恐失仁義故君子非義無以生失義即失其所以生小人非利無以活失利則失其所以活故君子懼失義小人懼失利觀其所懼禍福異矣道德仁義裂而皇帝王伯分世變使之然也道以導之德以生之仁以恩之義以宜之四代之治固若不同而其君臣有分則一焉夫道而不德者皇德而不懷者帝恐失仁義者王義失其宜智詐興矣老子曰事或欲利之適足以害之或欲害之乃足以利之夫病温而强餐之熱病渴而强飲之寒此衆人之所養也而良醫所以爲病也快於目說於心愚者之所利有道者之所避聖人者先迕而後合衆人先合而後迕故禍福之門利害之反不可不察也事有欲利而害欲害而利非人力之所可必者物或使之也是故先迕而後合者聖人之道先合而後迕者衆人之道禍福倚伏利害相反其不可不察也如此老子曰有功離仁義者即見疑有罪有仁義者必見信故仁義者事之常順也天下之尊爵也雖謀得計當慮患解圖國存其事有離仁義者其功必不遂也言雖無中於策其計無益於國而心周於君合於仁義者身必存故曰百言百計常不當者不若舍趨而審仁義也仁義者道之孫德之子歟四者若不相及而未嘗相離故仁義天下之尊爵也貴以身爲天下者可不舍趨而審諸仁義乎老子曰教本乎君子小人被其澤利本乎小人君子享其功使君子小人各得其宜即通功易食而道達矣人多欲即傷義多憂即害智故治國樂所以存虐國樂所以亡水下流而廣大君下臣而聰明君不與臣爭而治道通故君根本也臣枝葉也根本不美而枝葉茂者未之有也君子小人均是人也爲君子而教不被於小人何德以資小人之養哉治國樂其存虐國樂其亡君善下而不爭則羣臣獻其忠柢固根深而國安矣老子曰慈父之愛子者非求其報不可内解於心聖主之養民非爲己用也性不能己也及恃其力賴其功勳而必窮有以爲即恩不接矣故用衆人之所愛即得衆人之力舉衆人之所喜即得衆人之心故見其所始即知其所終父子之心天性也父之愛子君之養民一有望報之心恩其失矣是故因其利而利之則得衆人之力推其善而善之則得衆人之心子其有不孝臣其有不忠乎老子曰人以義愛黨以羣强是故德之所施者博即威之所行者遠義之所加者薄即武之所制者小君以天下爲心人以義愛則忠孝乃興黨以羣强則奸雄遂起安危所繫可不察而辯之老子曰以不義而得之又不布施患及其身不能爲人又無以自爲可謂愚人無以異於梟愛其子故持而盈之不如其已揣而鋭之不可長保德之中有道道之中有德其化不可極陽中有陰陰中有陽萬事盡然不可勝明福至祥存禍至祥先見祥而不爲善即福不來見不祥而行善即禍不至利與害同門禍與福同鄰非神聖莫之能分故曰禍兮福所倚福兮禍所伏孰知其極禍福倚伏如影隨形貨倍而入必倍而出善積而不善用如畜梟爲子寡不自害利害之機反兮覆兮非神聖莫之能知人之將疾也必先甘魚肉之味國之將亡也必先惡忠臣之語故疾之將死者不可爲良醫國之將亡者不可爲忠謀修之身然後可以治民居家理然後可移於官長故曰修之身其德乃眞修之家其德乃餘修之國其德乃豐民之所以生活衣與食也事周於衣食則有功不周於衣食則無功事無功德不長故隨時而不成無更其刑順時而不成無更其理時將復起是謂道紀國非民不立民非食不生不易之理也是故民足於衣食則可活不足於衣食則罔功功不立則德不長矣帝王富其民霸王富其地危國富其吏治國若不足亡國囷倉虚故曰上無事而民自富上無爲而民自化超師十萬日費千金師旅之後必有凶年故兵者不祥之器也非君子之寳也和大怨必有餘怨柰何其爲不善也古者親近不以言說來遠不以言使近者悦遠者來與民同欲即和與民同守即固與民同念者知得民力者富得民譽者顯行有召寇言有致禍無先人言後人而已附耳之語流聞千里言者禍也舌者機也出言不當駟馬不追無古今治亂而不易者土宇也古之今之或治或亂而不一者君民也帝王富其民霸王富其地危國富其吏治國若不足亡國囷倉虛是故唐虞之代天下往戰國之世無富民昔者中黄子曰天有五方地有五行聲有五音物有五味色有五章人有五位故天地之間有二十五人也上五有神人眞人道人至人聖人次五有德人賢人智人善人辯人中五有公人忠人信人義人禮人次五有士人工人虞人農人商人下五有衆人奴人愚人肉人小人上五之與下五猶人之與牛馬也聖人者以目視以耳聽以口言以足行眞人者不視而明不聽而聰不行而從不言而公故聖人所以動天下者眞人未嘗過焉賢人所以矯世俗者聖人未嘗觀焉所謂道者無前無後無左無右萬物玄同無是無非中黄子者古之眞人歟其言曰人有五位位各五等合之凡二十有五焉最上者神人最下者小人所謂上五之與下五猶人之與牛馬謂小人違道悖德若馬牛而襟裾耳聖人不及眞人賢人不及聖人惟其造道有淺深故品亦隨之通玄眞經纉義卷之七
