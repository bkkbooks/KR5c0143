front:
  text: 通玄眞經纘義卷之一
  hash: sha256:65b2b8429d173f1a3ea4e02393de541f775b467bd6454459a4771a19cca61f7d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0143_HFL_001-001a, image: hfl/0523/0523-014.png}
body:
  text: 南谷子杜道堅纂文子於章首多稱老子曰者尊師也此蓋當時記習老子之言故不敢自有其名書十有二篇凡一百八十八章道堅不揆淺陋隨義析之增八十一章章别其㫖題曰纘義以便觀覽云道原篇老子曰有物混成先天地生惟象無形窈窈㝠㝠寂寥澹泊不聞其聲吾强爲之名字之曰道夫道者高不可極深不可測苞裏天地禀受無形源流泏泏冲而不盈濁以靜之徐清施之無窮無所朝夕表之不盈一握約而能張幽而能明柔而能剛舍陰吐陽而章三光山以之高淵以之深獸以之走鳥以之飛鱗以之游鳳以之翔星曆以之行以亡取存以卑取尊以退取先道原於天萬物斯長道且强名何名非强是故生天地育萬物變化有無不測其妙者道也安天下撫兆民進退存亡不失其正者聖人也惟知道則亡可存卑可尊退可先矣古者三皇得道之統立於中央神與化游以撫四方是故能天運地輪轉而無廢水流而不止與物終始風興雲蒸雷聲雨降並應無窮已雕已琢還復於樸無爲爲之而合乎生死無爲言之而通乎道德恬愉無矜而得乎和有萬不同而便乎生和陰陽節四時調五行潤乎草木浸乎金石禽獸碩大毫毛潤澤鳥卵不敗獸胎不殰父無喪子之憂兄無哭弟之哀童子不孤婦人不孀虹蜺不見盜賊不行含德之所致也上古之君法天道爲治本與造化以同游故道純德全民康物阜摩不各遂生成之性道不悖則物無傷焉大常之道生物而不有成化而不宰萬物恃之而生莫之知德恃之而死莫之能怨收藏畜積而不加富布施禀受而不益貧忽兮恍兮不可爲象兮恍兮忽兮用不詘兮窈兮冥兮應化無形兮遂兮通兮不虛動兮與剛柔卷舒兮與陰陽俛仰兮能生生而不自生能化化而不自化夫是之謂大常之道聖人則之君天下而子庶民化行道合盛德之世也老子曰大丈夫恬然無思澹然無慮以天爲蓋以地爲車以四時爲馬以陰陽爲御行乎無路游乎無怠出乎無門以天爲蓋則無所不覆也以地爲車則無所不載也四時爲馬則無所不使也陰陽爲御則無所不備是故疾而不揺遠而不勞四支不動聰明不損而照見天下者執道之要觀無窮之地也故天下之事不可爲也因其自然而推之萬物之變不可究也秉其要而歸之是以聖人内修其本而不外飾其末厲其精神偃其知見故漠然無爲而無不爲無治而無不治也所謂無爲者不先物爲也無治者不易自然也無不治者因物之相然道在吾身與天爲一夫國之有臣佐猶天之有歲時也大丈夫出佐明君爲民司命察天時明物理循自然之道行無爲之化則吾之身修而政無不治矣老子曰執道以御民者事來而循之物動而因之萬物之化無不應也百事之變無不耦也故道者虛無平易清靜柔弱純粹素樸此五者道之形象也虛無者道之舍也平易者道之素也清靜者道之鑒也柔弱者道之用也反者道之常也柔者道之剛也弱者道之强也純粹素樸者道之幹也大道無形太平無象而曰虚無平易清靜柔弱純粹素樸爲道形象者其形豈其形其象豈其象哉惟不以形象執而造虚玄之用者乃可與言御民之道也虚者中無載也平者心無慮也嗜欲不載虚之至也無所好憎平之至也一而不變靜之至也不與物雜粹之至也不憂不樂德之至也太極中虚神明與俱人能心虚而道自居一有所載則嗜欲窒好憎生神將去矣神去道喪形有不亡者乎惟至德之人不與物雜一而不變心虚氣平憂樂何有哉夫至人之治也棄其聰明滅其文章依道廢智與民同出乎公約其所守寡其所求去其誘慕除其嗜欲損其思慮約其所守即察寡其所求即得故以中制外百事不廢中能得之則外能牧之中之得也五藏寧思慮平筋骨勁强耳目聰明大道坦坦去身不遠求之遠者往而復返文滅質博溺心外重則内輕是以大丈夫處其實不居其華至人之治無他恭默無爲而已返身而求道豈遠乎哉老子曰聖人忘乎治人而在乎自理貴忘乎勢位而在乎自得自得即天下得我矣樂忘乎富貴而在乎和知大己而小天下幾於道矣故曰致虚極也守靜篤也萬物並作吾以觀其復聖人無名未忘其功神人無功未忘乎己至人無己非無吾身也大己而小天下也唯有所待而後行故聖人之大寳曰位夫道者陶冶萬類終始無形寂然不動大通混冥深宏廣大不可爲外析豪剖芒不可爲内無環堵之宇而生有無之總名也眞人體之以虛無平易清靜柔弱純粹素樸不與物雜至得天地之道故謂之眞人道無形故能陶冶萬物道無名故能總括諸有眞人體道虚心靜神則天地之道得矣眞人者大己而小天下貴治身而賤治人不以物滑和不以欲亂情隱其名姓有道則隱無道則見爲無爲事無事知不知也懷大道包天心嘘吸陰陽吐故納新與陰俱閉與陽俱開與剛柔卷舒與陰陽俛仰與天同心與道同體無所樂無所苦無所喜無所怒萬物玄同無非無是夫形傷乎寒暑燥溼之虐者形究而神杜神傷於喜怒思慮之患者神盡而形有餘故眞人用心復性依神相扶而得終始是以其寢不夢覺而無憂外曲者人之道也内直者天之道也内直外曲天人相應未有不濟者矣是以眞人隱其姓名有道則隱不奪人之功也無道則見將救時之弊也惟能與天同心與道同體故能復性依神相扶而得終始矣孔子問道老子曰正汝形一汝視天和將至攝汝知正汝度神將來舍德將爲汝容道將爲汝居曈兮若新生之犢而無求其故形若枯木心若死灰眞其實知而不以曲故自持恢恢無心可謀明白四達能無知乎道有體用聖無二心玄聖素王體用二而道則一也孔子天縱之聖豈不知道而乃問於老子必有得於言外之意者故有猶龍之歎老子曰夫事生者應變而動變生於時知時者無常之行故道可道非常道名可名非常名書者言之所生也言出於智智者不知非常道也名可名非藏書者也多言數窮不如守中絶學無憂絶聖棄智民利百倍書載言言載道貴書所以貴道也是故知時者事生而變應變而動知書者言出於智智者不知惟不泥於書而滯於事絶其學棄其智始可與言應變之權人生而靜天之性也感物而動性之欲也物至而應智之動也智與物接而好憎生焉好憎成形而智出於外不能反己而天理滅矣是故聖人不以人易天外與物化而内不失情故通於道者反於清靜究於物者終於無爲以恬養智以漠合神即乎無門循天者與道游也隨人者與俗交也故聖人不以事滑天不以欲亂情不謀而當不言而信不慮而得不爲而成是以處上而民不重居前而人不害天下歸之姦邪畏之以其無爭於萬物也故莫敢與之爭天性本靜物欲滑之靜者動則天性鑿矣惟聖人外與物化心與天游物我玄同何爭之有老子曰夫人從欲失性動未嘗正也以治國則亂以治身則穢故不聞道者無以反其性不通物者不能清靜原人之性無袤穢乆湛於物即易易而忘其本即合於其若性水之性欲清沙石穢之人之性欲平嗜欲害之唯聖人能遺物反己是故聖人不以智役物不以欲滑和其於樂不忻忻其於憂不惋惋是以高而不危安而不傾故聽善言便計雖愚者知說之稱聖德高行雖不肖者知慕之說之者衆而用之者寡慕之者多而行之者少所以然者牽於物而繫於俗故曰我無爲而民自化我無事而民自富我好靜而民自正我無欲而民自樸心靜則明水靜則清理也學術不正習與性成則靜者動明者昏矣遇賢師而聞善言心有所悟則可復其性初之天合於大道以之修身則身修以之治國則國治是以聖人之道上無爲民自化上無事民自富上好靜民自正上無欲民自樸清靜者德之至也柔弱者道之用也虛無恬愉者萬物之祖也三者行則淪於無形無形者一之謂也一者無心合於天下也布德不溉用之不勤視之不見聽之不聞無形而有形生焉無聲而五音鳴焉無味而五味形焉無色而五色成焉故有生於無實生於虚音之數不過五五音之變不可勝聽也味之數不過五五味之變不可勝嘗也色之數不過五五色之變不可勝觀也音者宫立而五音形矣味者甘立而五味定矣色者白立而五色成矣道者一立而萬物生矣故一之理施於四海一之嘏察於天地其全也敦兮其若樸其散也渾兮其若濁濁而徐清沖而徐盈澹然若大海氾兮若浮雲若無而有若亡而存道無形而生有形始乎無始終乎無終一元之炁肇於太易太易其萬物之祖乎一生二而陰陽分五炁布而萬化興聖人之心合於太易清靜虚無德被四海萬物歸焉而不爲主道大無形與天爲一若夫耳之於聲目之於色口之於味則是與人同者也聖人何容心哉老子曰萬物之總皆閲一孔百事之根皆出一門故聖人一度循軌不變其故不易其常放準循繩曲因其常夫喜怒者道之袤也憂悲者德之失也好憎者心之過也嗜欲者生之累也人大怒破陰大喜墜陽薄氣發喑驚怖爲狂憂悲焦心疾乃成積人能除此五者即合於神明神明者得之内也得其内者五藏寧思慮平耳目聰明筋骨勁直疏達而不悖堅强而不匱無所太過無所不逮包衆妙總萬物者其道乎神而明之感而通之顯幽闡微無乎不在是故物得之而昌民得之而康時君得之則可以體皇極而御四方天下莫柔弱於水水之道也廣不可極深不可測長極無窮遠淪無涯息耗减益過於不訾上天爲雨露下地爲潤澤萬物不得不生百事不得不成大包羣生而無私好澤及蚑蟯而不求報富贍天下而不既德施百姓而不費行不可得而窮極微不可得而把握繫之不創刺之不傷斬之不斷灼之不熏淖約流循而不可靡散利貫金石强淪天下有餘不足任天下取與禀受萬物而無所先後無私無公與天地洪同是謂至德夫水所以能成其至德者以其淖約潤滑也故曰天下之至柔馳騁天下之至堅無有入於無間天一生水善利萬物功至博也天不得水不運地不得水不載物不得水不生民不得水不活雨露四時潤澤羣品淖約流行處下不爭禹德似之故能順水之性而地平天成夫無形者物之太祖無音者類之太宗眞人者通於靈府與造化者爲人執玄德於心而化馳如神是故不道之道芒乎大哉未發號施令而移風易俗其惟心行也萬物有所生而獨知其根百事有所出而獨守其門故能窮無窮極無極照物而不眩響應而不知道無定形隨物賦形變化見矣德無常師主善爲師體用得矣故眞人者藴乎道德通於神明物有所生獨知其根事有所出獨守其門無窮無極而與造化者爲人老子曰夫得道者志弱而事强心虛而應當志弱者柔毳安靜藏於不敢行於不能澹然無爲動不失時故貴必以賤爲本高必以下爲基託小以包大在中以制外行柔而剛力無不勝敵無不陵應化揆時莫能害之欲剛者必以柔守之欲强者必以弱保之積柔即剛積弱即强觀其所積以知存亡强勝不若於己者至於若己者而格柔勝出於己者其力不可量故兵强即滅木强即折革强即裂齒堅於舌而先斃故柔弱者生之幹也堅强者死之徒也物傋於我道存乎心知我之天知人之天而物之天者得矣水至柔也載舟則剛民至弱也戴主則强善用道者可以守柔弱而勝剛强先唱者窮之路後動者達之原夫執道以耦變先亦制後後亦制先何則不失所以制人人亦不能制也所謂後者調其數而合其時時之變則間不容息先之則大過後之則不及日回月周時不與人游故聖人不貴尺之璧而貴寸之陰時難得而易失故聖人隨時而舉事因資而立功守清道拘雌節因循而應變常後而不先柔弱以靜安徐以定功大靡堅莫能與之爭也事至而應道貴得中過與不及皆能害事惟先後不失其時則中道得而凡事濟矣是以聖人出處以時先後有度夫我不失於制人則人亦不能制我也老子曰機械之心藏于中即純白之不粹神德不全於身者不知何遠之能懷欲害之心忘乎中者即飢虎可尾也而況於人乎體道者佚而不窮任數者勞而無功夫法刻刑誅者非帝王之業也箠策繁用者非致遠之御也好憎繁多禍乃相隨故先王之法非所作也所因也其禁誅非所爲也所守也故能因即大作即細能守即固爲即敗執機械逐飢虎幾不免虎口之患惟我無機心虎亦無傷焉是故體道者佚任數者勞天下之理有不難見易則易知簡則易從夫法無刑誅之刻則易於治御無箠策之繁則能致遠是以先王之法因而不作禁非止惡守而不爲故可以成乆大之業也夫任耳目以聽視者勞心而不明以智慮而爲理者苦心而無功任一人之材難以致治一人之能不足以治三畝之宅循道理之數因天地自然即六合不足均也聽失於非譽目淫於采色禮亶不足以防愛誠心可以懷遠故兵莫憯於志而鏌鎁爲下寇莫大於陰陽而枹鼓爲細所謂大寇伏尸不言節中寇藏於山小寇藏於民間故曰民多智能奇物滋起法令滋章盜賊多有去彼取此天殃不起故以智治國國之賊不以智治國國之德視聽勞則心不明智慮重則事不理任一人之材而求爲治也難矣志誠心可以懷遠衆力可以成功即六合不足均也夫病乎身者陰陽冠之賊乎國者奸宄冠之不以智爲治乃爲國之福天無形大有形細無形多有形少無形强有形弱無形實有形虚有形者遂事也無形者作始也遂事者成器也作始者樸也有形則有聲無形則無聲有形產於無形故無形者有形之始也廣厚有名有名者貴全也儉薄無名無名者賤輕也殷富有名有名者尊寵也貧寡無名無名者卑辱也雄牡有名有名者章德也雌牝無名無名者隱約也有餘者有名有名者高賢也不足者無名無名者任下也有功即有名無功即無名有名產於無名無名者有名之母也夫道有無相生也難易相成也是以聖人執道虚靜微妙以成其德故有道即有德有德即有功有功即有名有名即復歸於道功名長乆終身無咎天下之物無生有有生無故無形爲有形之始道無名物有名而無名乃有名之母也知名與身孰親身與貨孰多則名不必高貨不必厚是以聖人執道以成其德功成身退自古及今其名不去王公有功名孤寡無功名故曰聖人自謂孤寡歸其根本功成而不有故有功以爲利無名以爲用古者民童蒙不知西東貌不離情言不出行行出無容言而不文其衣致煖而無采其兵鈍而無刃行蹎蹎視瞑瞑鑿井而飲耕田而食不布施不求德高下不相傾長短不相形風齊於俗可隨也事周於能易爲也矜僞以惑世軻行以迷衆聖人不以爲民俗古者民童蒙不知西東言無文衣無綵耕食鑿飲不施不求各足於己是故王公大人自稱孤寡而有道者不以名殺身不以政事殺民不以貨財殺子孫不以學術殺天下後世不以功名利禄累其心孰肯以矜僞惑世軻行迷衆者哉通玄眞經纉義卷之一
