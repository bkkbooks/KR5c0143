front:
  text: 通玄眞經纘義卷之八非八
  hash: sha256:8b78211ebdfd2851db7bce1b36460e6945a75b47a04aacefa597080a3ebeee93
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0143_SJB_008-160795b, image: sjb/16/160795b.png}
body:
  text: 南谷子杜道堅纂自然篇老子曰清虚者天之明也無爲者治之常也去恩惠舍聖智外賢能廢仁義滅事故棄佞辯禁姦僞即賢不肖者齊於道矣靜即同虚即通至德無爲萬物皆容虛靜之道天長地乆神微周盈於物無宰自然者天理不自然者人欲夫清虚而明天之自然無爲而治人之自然也自然則賢不肖者齊於道矣是以聖人神而明之光宅天下而物無宰焉十二月運行周而復始金木水火土其勢相害其道相待故至寒傷物無寒不可至暑傷物無暑不可故可與不可皆可是以大道無所不可可在其理見可不趨見不可不去可與不可相爲左右相爲表裏凡事之要必從一始時爲之紀自古及今未嘗變易謂之天理上執大明下用其光道生萬物理於陰陽化爲四時分爲五行各得其所與時往來法度有常下及無能上道不傾羣臣一意天地之道無爲而備無求而得是以知其無爲而有益也宇宙之間造化流行而不息者氣而已有神焉莫可得而識也一爲之始時爲之紀古今不忒是謂天理道生萬物法度有常有物主之莫知或使是以道之尊而德之貴老子曰樸至大者無形狀道至大者無度量故天圜不中規地方不中矩往古來今謂之宙四方上下謂之宇道在其中而莫知其所故見不遠者不可與言大知不博者不可與論至夫禀道與物通者無以相非故三皇五帝法籍殊方其得民心一也若夫規矩勾繩巧之具也而非所以爲巧也故無絃雖師文不能成其曲徒絃即不能獨悲故絃悲之具也非所以爲悲也至於神和游於心手之間放意寫神論變而形於絃者父不能以教子子亦不能受之於父此不傳之道也故肅者形之君也而寂寞者音之主也樸大無形道大無量天圓地方道在其中故三皇五帝法籍殊方其得民心一也若夫規矩勾繩則是爲巧之具非所以爲巧矣師文之琴有類乎是老子曰天地之道以德爲主道爲之命物以自正至微甚内不以事貴故不待功而立不以位爲尊不待名而顯不須禮而莊不用兵而强故道立而不教明照而不察道立而不教者不奪人能也明照而不察者不害其事也古人質樸其俗同故不待教後人澆漓其俗異故聖人憂道之不明而教立天天地之道以德爲主而道爲之命物各自正自然而已聖人何庸心哉夫教道者逆於德害於物故陰陽四時金木水火土同道而異理萬物同情而異形知者不相教能者不相受故聖人立法以導民之心各使自然故生者無德也死者無怨也天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗夫慈愛仁義者近狹之道也狹者入大而迷近者行遠而惑聖人之道入大不迷行遠不惑常虛自守可以爲極是謂天德古之教者以道今之教者以利此道之所以不行也夫聖人立法以導民心使各安其自然之分生者自生死者自死德怨何有哉老子曰聖人天覆地載日月照臨陰陽和四時化懷萬物而不同無故無新無疏無親故能法天也天不一時地不一財人不一事故緒業多端趨行多方故用兵者或輕或重或貪或廉四者相反不可一也輕者欲發重者欲止貪者欲取廉者不利非其有也故勇者可令進鬥不可令持堅重者可令固守不可令陵敵貪者可令攻取不可令分財廉者可令守分不可令進取信者可令持約不可令應變五者聖人兼用而材使之夫天地不懷一物陰陽不產一類故海不讓水潦以成其大山林不讓枉撓以成其崇聖人不辭負薪之言以廣其名夫守一隅而遺萬方取一物而棄其餘即所得者寡而所治者淺矣天之命者一氣感不同性隨質異變有萬殊不可率而齊也聖人憲天法道不以殊方異俗爲之間而覆之載之養之育之一而已矣老子曰天之所覆地之所載日月之所照形殊性異各有所安樂所以爲樂者乃所以爲悲也安所以爲安者乃所以爲危也故聖人養牧民也使各便其性安其居處其宜爲其所能周其所適施其所宜如此則萬物一齊無由相過天下之物無貴無賤因其所貴而貴之物無不貴因其所賤而賤之物無不賤故不尚賢者言不放魚於木不沉鳥於淵善牧民者不一其法形殊性異各有所安反而置之則生道失矣然則莊周之謂齊物論者豈齊物哉齊物理也天之生物各因其材而篤之昔堯之治天下也舜爲司徒契爲司馬禹爲司空后稷爲田疇奚仲爲工師其導民也水處者漁林處者採谷處者牧陸處者田地宜其事事宜其械械宜其材臯澤織網陵阪耕田如是則民得以所有易所無以所工易所拙是以離叛者寡聽從者衆若風之過蕭忽然而感之各以清濁應物莫不就其所利避其所害是以鄰國相望鷄狗之音相聞而足迹不接於諸侯之境車軌不結於千里之外皆安其居也故亂國若盛治國若虛亡國若不足存國若有餘虛者非無人也各守其職也盛者非多人也皆徼於末也有餘者非多財也欲節而事寡也不足者非無貨也民鮮而費多也故先王之法非所作也所因也其禁誅非所爲也所守也上德之道也古之君天下者君逸臣勞無爲而治堯之時舜爲司徒契爲司馬禹爲司空百官分職各以其能惟官得其人則民安其處功成事遂百姓皆謂我自然老子曰以道治天下非易人性也因其所有而條暢之故因即大作即小古之瀆水者因水之流也生稼者因地之宜也征伐者因民之欲也能因則無敵於天下矣物必有自然而後人事有治也故先王之制法因人之性而爲之節文無其性不可使順教有其性無其資不可使遵道人之性有仁義之資其非聖人爲之法度不可使向方因其所惡以禁姦故刑罰不用威行如神因其性即天下聽從拂其性即法度張而不用聖人因人性而設教觀風俗以爲治民之所好好之民之所惡惡之是以民心歸往而無敵於天下矣道德者功名之本也民之所懷也民懷之則功名立古之善爲君者法江海江海無爲以成其大窊下以成其廣故能長乆爲天下谿谷其德乃足無爲故能取百川不求故能得不行故能至是以取天下而無事不自貴故富不自見故明不自矜故長處不有之地故爲天下王不爭故莫能與之爭終不爲大故能成其大江海近於道故能長乆與天地相保王公修道功成不有不有即强固强固而不以暴人道深即德深德深即功名遂成此謂玄德深矣遠矣其與物反矣道德非釣名之具而名隨之古之善爲君者守無爲之德處不爭之地功成不有故能與天地相爲長乆天下有始莫知其理唯聖人能知所以非雄非雌非北非牡生而不死天地以成陰陽以形萬物以生故陰之與陽有圓有方有短有長有存有亡道爲之命幽沉而無事於心甚微於道甚當死生同理萬物變化合於一道簡生忘死何往不壽去事與言順無爲也守道周密於物不宰至微無形天地之始萬物周於道而殊於形至微無物故能周恤至大無外故爲萬物蓋至細無内故爲萬物貴道以存生德以安形至道之度去好去惡無有知故易意和心無與道迕夫天地專而爲一分而爲二反而合之上下不失專而爲一分而爲五反而合之必中規矩夫道至親不可䟽至近不可遠求之遠者往而復反能知古始是謂道紀道其天下之始乎無形而大不言而信變化無方莫知其理唯聖人知之是以日應萬機無與道迕反而合之爲道之紀老子曰帝者有名莫知其情帝者貴其德王者尚其義霸者通於理聖人之道於物無有通狹然後任智德薄然後任刑明淺然後任察任智者心中亂任刑者上下怨任察者不求善以事上即弊是以聖人因天地以變化其德乃天覆而地載道之以時其養乃厚厚養即治雖有神聖夫何以易之去心知省刑罰反清靜物將自正開物之初帝者爲誰太古三皇民如嬰兒呼吸太和無思無爲上古三皇民如孩提含哺鼓腹爲無所爲下古三皇民童時樸散道行爲所以爲庖生粒食天下親之五帝貴德天下譽之三王尚義天下畏之五伯失理天下侮之玄聖不作素王述之立言垂教爲萬世師聖人復起無以易之道之爲君如尸儼然玄默而天下受其福一人被之不褒萬人被之不褊是故重爲惠重爲暴即道迕矣爲惠者布施也無功而厚賞無勞而高爵即守職者懈於官而游居者亟於進矣夫暴者妄誅無罪而死亡行道者而被刑即修身者不勸善而爲袤行者輕犯上矣故爲惠者即生姦爲暴者即生亂姦亂之俗亡國之風也故國有誅者而主無怒也朝有賞者而君無與也誅者不怨君罪之當也賞者不德上功之至也民知誅賞之來皆生於身故務功修業不受賜於人是以朝廷蕪而無迹田埜辟而無穢故太上下知有之春生秋殺天之道也人主法天行道爲臣子者知所懲勸刑賞之來皆由自己莫不務功修業無僥倖之心朝廷正而田野闢太上之風宜可復矣王道者處無爲之事行不言之教清靜而不動一定而不揺因循任下責成而不勞謀無失策舉無過事言無文章行無儀表進退應時動靜循理美醜不好憎賞罰不喜怒名各自命類各自以事由自然莫出於己若欲狹之乃是離之若欲飾之乃是賊之天氣爲魂地氣爲魄反之玄妙各處其宅守之勿失上通太一太一之精通合於天天道默默無容無則大不可極深不可測常與人化智不能得運轉無端化遂如神虛無因循常後而不先其聽治也虛心弱志清明不闇是故羣臣輻凑並進無愚智賢不肖莫不盡其能君得所以制臣臣得所以事君即治國之所以明矣有天下者不患不治患不得人得人則王者無爲乎上守而勿失上通太一運轉無端化遂如神羣臣並進各盡其能是知國之治亂繫乎人老子曰知而好問者聖勇而好問者勝乗衆人之智者即無不任也用衆人之力者即無不勝也用衆人之力者鳥獲不足恃也乗衆人之勢者天下不足用也無權不可爲之勢而不循道理之數雖神聖人不能以成功故聖人舉事未嘗不因其資而用之也有一功者處一位有一能者服一事力勝其任即舉者不重也能稱其事即爲者不難也聖人兼而用之故人無棄人物無棄材知仁勇天下之達德也好問則裕合衆人之智用衆人之力而天下無敵矣有一功者處一位有一能者服一事聖人兼而用之故無棄人無棄材老子曰所謂無爲者非謂其引之不來推之不去迫而不應感而不動堅滯而不流捲握而不散謂其私志不入公道嗜欲不挂正術循理而舉事因資而立功推自然之勢曲故不得容事成而身不伐功成而名不有若夫水用舟沙用泥用輴山用樏夏瀆冬陂因高爲山因下爲池非吾所爲也聖人不恥身之賤惡道之不行也不憂命之短憂百姓之窮也故常虛而無爲抱素見樸不與物雜無爲者非木石其心而不動也聖人應物不先物因其自然之勢曲成萬物夫何爲焉老子曰古之立帝王者非以奉養其欲也聖人踐位者非以逸樂其身也爲天下之民强凌弱衆暴寡詐者欺愚勇者侵怯又爲其懷智不以相教積財不以相分故立天子以齊一之爲一人之明不能徧照海内故立三公九卿以輔翼之爲絶國殊俗不得被澤故立諸侯以教誨之是以天地四時無不應也官無隱事國無遺利所以衣寒食飢養老弱息勞倦無不以也帝王者天地之心乎土地之廣人民之衆無君以主之則强凌弱衆暴寡智詐欺愚民不安處故立天子設三公作民父母撫之育之易曰后以財成天地之道輔相天地之宜以左右民則天地之心可見矣神農形悴堯𤸃臞舜黧黑禹骿胝伊尹負鼎而干湯吕望鼓刀而入周百里奚傳賣管仲束縛孔子無黔突墨子無煖席非以貪禄慕位將欲起天下之利除萬民之害也自天子至於庶人四體不勤思慮不困於事求贍者未之聞也古之聖人耳目口鼻與人同飢餐渴飲與人同其所不同者心也爲天下萬世生民立極凡在聖人之列者鮮不勞其心志而後成其功功成復不自有其功此所以爲聖也老子曰所謂天子者有天道以立天下也立天下之道執一以爲保反本無爲虛靜無有忽怳無際遠無所止視之無形聽之無聲是謂大道之經天地者人之大父母也凡有血氣者皆天之所子而君爲之長代天作子焉故稱天子天子視民猶赤子不廢所與養則天視天聽此感彼應夫是之謂大道之經老子曰夫道者體圓而法方背陰而抱陽左柔而右剛履幽而戴明變化無常得之一原以應無方是謂神明天圓而無端故不得觀其形地方而無涯故莫能窺其門天化遂無形狀地生長無計量夫物有勝唯道無勝所以無勝者以其無常形勢也輪轉無窮象日月之運行若春秋之代謝日月之晝夜終而復始明而復晦制形而無形故功可成物物而不物故勝而不屈道生天地天地生人猶祖生父而父生子氣神感化形萬殊而道一焉道無形身有形夫制形者無形役物者不物其神矣夫廟戰者帝神化者王廟戰者法天道神化者明四時修正於境内而遠方懷德制勝於未戰而諸侯賔服也古之得道者靜而法天地動而順日月喜怒法四時號令比雷霆音氣不戾八風詘申不變五度因民之欲乗民之力爲之去殘除害夫同利者相死同情者相成同行者相助循己而動天下爲鬥故善用兵者用其自爲用不能用兵者用其爲己用用其自爲用天下莫不可用其爲己用無一人之可用也日月奪明則蝕陰陽失和則戰戰則物必傷焉廟戰者帝垂衣裳而天下治也神化者王班師振旅而苗民格也使桀受修德則牧野鳴條何得因民之欲用民之力而故其主哉惟民有皆亡之心故不曰弑君而曰去殘除害也悲夫通玄眞經纘義卷之八
