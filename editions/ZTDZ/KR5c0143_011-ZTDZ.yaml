front:
  text: 通玄眞經纘義卷之十一非十一
  hash: sha256:1064f6e86db2b6440065eee48d30ca65bdf37be4c4cac0aa6b6c4653da29dd01
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0143_SJB_011-160811a, image: sjb/16/160811a.png}
body:
  text: 南谷子杜道堅纂上義篇老子曰凡學者能明於天人之分通於治亂之本澄心清意以存之見其終始反於虚無可謂達矣治之本仁義也其末法度也人之所生者本也其所不生者末也本末一體也其兩愛之性也先本後末謂之君子先末後本謂之小人法之生也以輔義重法棄義是貴其冠履而忘其首足也仁義者廣崇也不益其厚而張其廣者毁不廣其基而增其高者覆故不大其棟不能任重任重莫若棟任國莫若德人主之有民猶城之有基木之有根根深即本固基厚即上安故事不本於道德者不可以爲經言不合於先王者不可以爲道便說掇取一行一功之術非天下通道也上義者明於天人之分通於治亂之本治有本末知所先後則近於道德矣術其可以治天下乎老子曰治人之道其猶造父之御駟馬也齊輯之乎轡銜正度之乎胸膺内得於中心外合乎馬志故能取道致遠氣力有餘進退還音旋曲莫不如意誠得其術也今夫權勢者人主之車與也大臣者人主之駟馬也身不可離車輿之安手不可失駟馬之心故駟馬不調造父不能以取道君臣不和聖人不能以爲治也執道以御之中才可盡明分以示之姦袤可止物至而觀其變事來而應其化近者不亂即遠者治矣不用適然之教而得自然之道萬舉而不失矣天地一馬萬物一指聖人格物之至而以車輿譬乎權勢駟馬譬乎大臣人主因而乗之不煩智力無遠不服是乃治之方也安得執御者而與之言乎老子曰凡爲道者塞袤隧音遂暗路防未然不貴其自是也貴其不得爲非也故曰勿使可欲無日不求勿使可奪無日不爭如此則人欲釋而公道行矣有餘者止於度不足者逮於用故天下可一也夫釋職事而聽非譽棄功勞而用朋黨即奇伎逃亡守職不進民俗亂於國功臣爭於朝故有道以御人無道則制於人良醫不治已病治未病爲道者塞邪隧治未然其亦良醫之謂歟故不貴自是貴不爲非則無可欲之求可奪之爭矣故有道則可以御人無道則受制於人老子曰治國有常而利民爲本政教有道而令行爲右苟利於民不必法古苟周於事不必循俗故聖人法與時變禮與俗化衣服器械各便其用法度制令各因其宜故變古未可非而循俗未足多也誦先王之書不若聞其言聞其言不若得其所以言得其所以言者言不能言也故道可道非常道也名可名非常名也故聖人所由曰道猶金石也一調不可更事猶琴瑟也曲終改調法制禮樂者治之具也非所以爲治也故曲士不可與言至道者訊寤於俗而束於教也道乃法之體法乃道之用夫治國有常而利民爲本者道也政教有道而令行爲右者法也聖人法與時變禮與俗化法度制令各因其宜故曲士不可與論至道爲其束於教耳老子曰天下幾有常法哉當於世事得於人理順於天地詳於鬼神即可以正治矣昔者三皇無制令而民從五帝有制令而無刑罰夏后氏不負言殷人誓周人盟末世之衰也忍垢而輕辱貪得而寡羞故法度制令者論民俗而節緩急器械者因時變而制宜適夫制於法者不可與遠舉拘禮之人不可使應變必有獨見之明獨聞之聰然後能擅道而行夫知法之所由生者即應時而變不知治道之源者雖循終亂今爲學者循先襲業握篇籍守文法欲以爲治猶持方枘而内圓鑿也欲得宜適亦難矣夫存危治亂雖智不能道先稱古雖愚有餘故不用之法聖人不行也不驗之言明主不聽也聖人立法本爲禁奸惡平冤抑保人民也三皇無制令而從五帝而下所制法令賞罰代各不同者時變故也明主其可不究乎文子問曰法安所生老子曰法生於義義生於衆適衆適合乎人心此治之要也法非從天下也非從地出也發乎人間反己自正誠達其本不亂於末知其要不惑於疑有諸己不非於人無諸己不責於所立立於下者不廢於上禁於民者不行於身故人主之制法也以自爲檢式故禁勝於身即令行於民又子問法安所生老子語以法生於義義者宜也先王立法務適衆情故先以身爲檢式所禁於民者不敢犯於身是故令行而天下從之夫法者天下之準繩也人主之度量也縣法者法不法也法定之後中繩者賞缺繩者誅雖尊貴者不輕其賞卑賤者不重其刑犯法者雖賢必誅中度者雖不肖無罪是故公道行而私欲塞古之置有司也所以禁民使不得恣也其立君也所以制有司使不專行也法度道術所以禁君使不得横斷也人莫得恣即道勝而理得矣故反於無爲無爲者非謂其不動也言其從己出也法者人主示度量爲天下準繩也法定之後不二所施夫犯法者雖尊貴必誅中度者雖卑賤無罪故私欲塞而公道行矣古之置有司立人君制禮法三者不廢天下無怨民世可反樸法令何庸哉老子曰善賞者費少而勸多善罰者刑省而姦禁善與者用約而爲德善取者入多而無怨故聖人因民之所喜以勸善因民之所憎以禁姦賞一人而天下趨之罰一人而天下畏之是以至賞不費至刑不濫聖人守約而治廣此之謂也生長殺藏天之道也賞罰取與人之道也聖人上法天道下因民心而爲平治之本夫有天下者能於四者之柄每事盡善故賞一人而天下趨之罰一人而天下畏之老子曰臣道者論是處當爲事先唱守職明分以立成功故君臣異道即治同道即亂各得其宜處有其當即上下有以相使也故枝不得大於榦末不得强於本言輕重大小有以相制也夫得威勢者所持甚少所任甚大所守甚約所制甚廣十圍之木持千鈞之屋所得勢也五寸之關能制開闔所居要也下必行之令順之者利逆之者害天下莫不聽從者順也發號令行禁止者以衆爲勢也義者非能盡利於天下之民也利一人而天下從之暴者非能盡害於海内也害一人而天下叛之故舉措廢置不可不審也君依臣而立臣依君而行君無爲乎上臣有爲乎下論是處當守職明分臣之事也君臣各得其宜即上下有以相使小大有以相制故異道即治舉措廢置有關於治亂爲君者不可不審也老子曰屈寸而伸尺小枉而大直聖人爲之今人君之論臣也不計其大功總其略行而求其小善即失賢之道也故人有厚德無問其小節人有大譽無疵其小故夫人情莫不有所短成其大略是也雖有小過不足以爲累也成其大略非也閭里之行未足多也故小謹者無成功疵行者不容衆體大者節疏度巨者譽遠論臣之道也世之全材難得自古皆然夫工師之求棟梁能不拘小節故大材可得人主之論臣佐知屈寸而伸尺則大賢可得矣蓋人無十全事無盡美舍小取大何功不成舍短從長何事不濟老子曰自古及今未有能全其行者也故君子不責備於一人方而不割廉而不劌直而不肆博達而不訾道德文武不責備於人力自修以道而不責於人易償也自修以道則無病矣夫夏后氏之璜不能無瑕明月之珠不能無穢然天下寳之者不以小惡妨大美今志人之所短忘人之所長而欲求賢於天下即難矣衆人之見位卑身賤事之洿辱而不知其大略故論人之道貴即觀其所舉富即觀其所施窮即觀其所不受賤即觀其所不爲視其所處難以知其所勇動以喜樂以觀其守委以貨財以觀其仁振以恐懼以觀其節如此則人情可得矣自恕者不改過責人者不全交夫君子不責備於人者知人非堯舜不能每事盡善也人有大材詎可以小節而棄之乎老子曰屈者所以求伸也枉者所以求直也屈寸伸尺小枉大直君子爲之百川並流不注海者不爲谷趨行殊方不歸善者不爲君子善言貴乎可行善行貴乎仁義夫君子之過猶日月之蝕不害於明故智者不妄爲勇者不妄殺擇是而爲之計禮而行之故事成而功足恃也身死而名足稱也雖有智能必以仁義爲本而後立智能並行聖人一以仁義爲準繩中繩者謂之君子不中繩者謂之小人君子雖死亡其名不滅小人雖得勢其罪不除左手據天下之圖而右手刎其喉雖愚者不爲身貴於天下也死君親之難者視死如歸義重於身也故天下大利也比之身即小身之所重也比之仁義即輕此以仁義爲準繩者也屈伸相感之道君子小枉而大直猶龍蛇之蟄奮善言善行潤澤群生皆自屈身養德中來聖人以仁義爲準繩知身重於天下義重於身故能死君親之難是以君子身死而名不亡老子曰道德之倫猶日月也夷狄蠻貊不能易其指趨舍同即非譽在俗意行均即窮達在時事周於世即功成務合於時即名立是故立功名之人簡於世而謹於時時之至也間不容息古之用兵者非利土地而貪寳賂也將以存亡平亂爲民除害也貪叨多欲之人殘賊天下萬民騷動莫寧其所有聖人勃然而起討强暴平亂世爲天下除害以濁爲清以危爲寧故不得不中絶人之道德天之日月也人之五性天之五星也雖夷狄蠻貊無以易之夫趣舍在己非譽在人用不用關於時行不行係乎命是以君子得時行道間不容息赤帝爲火災故黄帝擒之共工爲水害故顓頊誅之教之以道導之以德而不聽即臨之以威武臨之不從則制之以兵革殺無罪之民養不義之主害莫大焉殫天下之財贍一人之欲禍莫深焉肆一人之欲而長海内之患此天倫所不取也所爲立君者以禁暴亂也今乗萬民之力反爲殘賊是以虎傅翼何爲不除夫畜魚者必去其猵獺養禽獸者必除其豺狼又況牧民乎是故兵革之所爲超也國家五運其來乆矣赤帝火運君失其德火乃爲災共工水運君失其德水乃爲災以知人君失德隨運爲災此兵革之所爲起也凡有土之君其可失德致災而不知儆悟乎老子曰爲國之道上無苛令官無煩治士無僞行工無淫巧其事任而不擾其器完而不飾亂世即不然爲行者相揭以高爲禮者相矜以僞車輿極於雕琢器用邃於刻鏤求貨者爭難得以爲寳詆文者逐煩撓以爲急事爲僞辯乆稽而不决無益於治有益於亂工爲奇器歷歲而後成不周於用夫神農之法曰丈夫丁壯不耕天下有受其飢者婦人當年不織天下有受其寒者故身親耕妻親織以爲天下先其導民也不貴難得之貨不重無用之物是故耕者不强無以養生織者不力無以衣形有餘不足各歸其身衣食饒裕姦邪不生安樂無事天下和平智者無所施其策勇者無所措其威古今爲國其道不同者俗變故也古人淳樸上無苛令官無煩治士無僞行工無淫巧是故人心易足爲治不難後世俗變風移上行下效奢侈相尚貪欲無厭是以人心難足爲治不易老子曰霸王之道以謀慮之以策圖之挾義而動非以圖存也將以存亡也故聞敵國之君有暴虐其民者即舉兵而臨其境責以不義刺以過行兵至其郊令軍帥曰無伐樹木無掘墳墓無敗五穀無焚積聚無捕民虜無聚六畜乃發號施令曰其國之君逆天地侮鬼神决獄不平殺戮無罪天之所誅民之所讎也兵之來也以廢不義而受其德也有敢逆天道亂民之賊者身死族滅以家聽者禄以家以里聽者賞以里以鄉聽者侯以鄉克其國不及其民廢其君易其政尊其秀士顯其賢良振其孤寡恤其貧窮出其囹圄賞其有功百姓開户而納之漬米而儲之唯患其不來也義兵至於境不戰而止不義之兵至於伏尸流血相交以前爲地戰者不能成其王爲身求者不能立其功舉事以爲人者衆助之以自爲者衆去之衆之所助雖弱必强衆之所去雖大必亡文子十二篇三而四之先皇後霸帝王在焉霸之世時之秋歟觀其非以圖存將以存亡之語則興廢繼絶之風藹然在目視後世不義之舉遠矣老子曰上義者治國家理境内行仁義布德施惠立正法塞袤道群臣親附百姓和輯上下一心群臣同力諸侯服其威四方懷其德修政廟堂之上折衝千里之外發號行令而天下響應此其上也地廣民衆主賢將良國富兵强約束信號令明兩敵相當未交兵接刃而敵人奔亡此其次也知土地之宜習險隘之利明苛政之變察行陣之事白刃合流矢接輿死扶傷流血千里暴骸滿野義之下也兵之勝敗皆在於政政勝其民下附其上即兵强民勝其政下叛其上即兵弱義足以懷天下之民事業足以當天下之急選舉足以得賢士之心謀慮足以决輕之權此上義之道也兵法先舉者爲主應敵者爲客用兵有言吾不敢爲主而爲客謂兵不可輕舉也夫不得已而用之則義舉爲上敵奔次之戰斯下矣老子曰國之所以强者必死也所以死者必義也義之所以行者威也是故令之以文齊之以武是謂必取威義並行是謂之强白刃交接矢石若雨而士爭先者賞信而罰明也上視下如子下事上如父上視下如弟下事上如兄視下如子必王四海視上如父必正天下上視下如弟即不難爲之死下事上如兄即不難爲之亡故父子兄弟之寇不可與之鬥是故義君内修其政以積其德外塞於邪以明其勢察其勞佚以知飢飽戰期有日視死如歸恩之加也治天下有道奚以兵爲哉不得已也强國之兵必死者義迫之也然則有道之主忍以强國而置民於死地乎上視下如子下事上如父是故義君修政積德國將自强世固有之矣通玄眞經纉義卷之十一
