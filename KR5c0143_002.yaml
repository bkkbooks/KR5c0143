front:
  text: 通玄眞經纘義卷之二非二
  hash: sha256:5ac53bcb23a6a5289fea916959479532b4a22b7b830e7bc3de77bf9369907754
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0143_HFL_002-001a, image: hfl/0523/0523-048.png}
body:
  text: 南谷子杜道堅纂精誠篇老子曰天致其高地致其厚日月照列星朗陰陽和非有爲焉正其道而物自然陰陽四時非生萬物也雨露時降非養草木也神明接陰陽和萬物生矣夫道者藏精於内棲神於心靜漠恬澹悦穆胸中廓然無形寂然無聲官府若無事朝廷若無人無隱士無逸民無勞役無冤刑天下莫不仰上之德象主之㫖絶國殊俗莫不重譯而至非家至而人見之也推其誠心施之天下而已故賞善罰暴者致令也其所以能行者精誠也令雖明不能獨行必待精誠故總道以被民而民弗從者精誠弗至也古之聖人官天地府萬物藏精存誠無形無聲正其道而任物之自然當是時也朝無倖臣野無遺逸國無游民干戈不超勞役不興四民樂業故不待家至人曉而坐致隆平老子曰天設日月列星辰張四時調陰陽日以暴之夜以息之風以乾之雨露以濡之其生物也莫見其所養而萬物長其殺物也莫見其所喪而萬物亡此謂神明是故聖人象之其超福也不見其所以而福超其除禍也不見其所由而禍除稽之不得察之不虚日計不足歲計有餘寂然無聲一言而大動天下是以天心動化者也故精誠内形氣動於天景星見黄龍下鳳凰至醴泉出嘉穀生河不滿溢海不波涌日月星辰天之神水火土石地之神雨風露雷暑寒晝夜皆神也人性最靈是又神於物者矣天之生物不見所養日見其長聖人養民除害興利亦如之皆由精誠内著氣感於天陰陽順之神明祐之而嘉祥至矣逆天暴物即日月薄蝕五星失行四時相乗晝冥宵光山崩川涸冬雷夏霜天之與人有以相通故國之殂亡也天文變世俗亂虹蜺見萬物有以相連精氣有以相薄故神明之事不可以智巧爲也不可强力致也故大人與天地合德與目月合明與鬼神合靈與四時合信懷天心抱地氣執冲含和不下堂而行四海變易習俗民化遷善若出諸己能以神化者也天人一氣隱顯相通和氣致祥沴氣致殃未有不由人主者也故夫逆天暴物悖道敗德皇天震怒禍亦隨之有如成王悔過偃禾返風宋君一言火星退舍是皆精誠格天轉禍爲祥之徵老子曰夫人道者全性保眞不虧其身遭急迫難精通乎天若乃未始出其宗者何爲而不成死生同域不可脅凌又況官天地府萬物返造化含至和而已未嘗死者也精誠形乎内而外諭於人心此不傳之道也人之生也受命於天者同故性無不善全性保眞不虧其身精通于天何爲不成至若返造化含至和而未嘗死者夫是之謂眞人聖人在上懷道而不言澤及萬民故不言之教芒乎大哉君臣乖心倍譎見乎天神氣相應徵矣此謂不言之辯不道之道也夫召遠者使無爲焉親近者言無事焉唯夜行者能有之故却走馬以糞車軌不接於遠方之外是謂坐馳陸沉天道無私就也無私去也能者有餘拙者不足順之者利逆之者凶是故以智爲治者難以持國唯同乎大和而持自然應者爲能有之聖人懷道澤及民祥可見也君臣乖心見乎天殃可見也遠者無爲近者無事神氣應徵有不待召而至矣無私就無私去有餘不足同乎大和不言之教自然而已老子曰夫道之與德若韋之與革遠之即近近之即疏稽之不得察之不虚是故聖人若鏡不將不迎應而不藏萬物不傷其得之也乃失之也其失之也乃得之也故通於大和者闇若醇醉而甘卧以游其中若未始出其宗是謂大通此假不用能成其用也道尊德貴異名同出存乎吾心不從外得生之畜之不無不有聖人之心有如明鏡物來則應物去則靜含乎精誠純乎道德不爲何敗不執何失若未始出其宗則鬼神不能識老子曰昔黄帝之治天下調日月之行治陰陽之氣節四時之度正律曆之數别男女明上下使强不掩弱衆不暴寡民保命而不夭歲時熟而不凶百官正而無私上下調而無尤法令明而不闇輔佐公而不阿田者讓畔道不拾遺市不預賈故於此時日月星辰不失其行風雨時節五穀豐昌鳳凰翔於庭麒麟游於郊觀天之道執天之行黄帝得之而天下治異時退捐天下趨空同禮下風見廣成子問治身柰何而可以長乆廣成子曰至道之精窈窈冥冥至道之極昏昏默默無視無聽抱神以靜形將自正必靜必清無勞汝形無摇汝精乃可以長生虛犧氏之王天下也枕石寢繩殺秋約冬負方洲抱圓天陰陽所擁沉滯不通者竅理之逆氣戾物傷民厚積者絶止之其民童蒙不知西東視瞑瞑行蹎蹎侗然自得莫知其所由浮游汎然不知所本自養不知所如往當此之時禽獸蟲蛇無不懷其爪牙藏其螫毒功揆天地至黄帝要繆乎太祖之下然而不章其功不揚其名隱眞人之道以從天地之固然何則道德上通而智故消滅也六紀將終二皇不作而後太昊氏出當此之時大樸散而人事萌天下始有爲矣觀象制器結繩爲網以伏犧牲是謂伏犧冶金爲釜庖生爲熟一號庖犧當是時也禽獸蟲蛇懷其爪牙而不傷人焉至若造書契正人倫功揆天地而不以爲功尊曰太昊不亦宜乎老子曰天不定日月無所載地不定草木無所立身不寧是非無所形是故有眞人而後有眞知其所持者不明何知吾所謂知之非不知與積惠重貨使民忻忻人樂其生者仁也舉大功顯令名禮君臣正上下明親疏存危國繼絶世立無後者義也閉九竅藏志意棄聰明反無識芒然仿佯乎塵垢之外逍遥乎無事之際含陰吐陽而與萬物同和者德也是故道散而爲德德溢而爲仁義仁義立而道德廢矣道德之於五常陰陽之於五行一也知日月代明四時錯行而後歲成則知人之道道德五常可相有不可相無然則老子曰絶聖棄智絶仁棄義何哉所惡假其名而行之耳使眞有絶棄之心則道德二篇不言聖人不言仁義矣是故有眞人而後有眞知老子曰神越者言華德蕩者行僞至精芒乎中而言行觀乎外此不免以身役物也精有愁盡而行無窮極所守不定而外淫於世俗之風是故聖人内修道德而不外飾仁義知九竅四支之宜而游乎精神之和此聖人之游也道德五常之祖有祖而無子孫不可也有子孫而不知有祖可乎五常五神也道德存乎中則神不越乎外一失所守神越言華德蕩行僞鮮不喪於物役矣惟聖人知九竅四支之宜游乎精神之和祖者存子孫其有不存乎老子曰若夫聖人之游也即動乎至虚游心乎太無馳於方外行於無門聽於無聲視於無形不拘於世不繫於俗故聖人所以動天下者眞人不過賢人所以矯世俗者聖人不觀夫人拘於世俗必形繫而神泄故不免於累使我可拘係者必其命有在乎外者矣身不繫於俗則人不厭我心不拘於世則我無厭人夫是之謂與造物者游是以動天下者眞人不過矯世俗者聖人不觀志役於物形繫而神泄賢人有不免況衆人乎老子曰人主之思神不見於胸中智不出於四域懷其仁誠之心甘雨以時五穀蕃植春生夏長秋收冬藏月省時考終歲獻貢養民以公威厲不誡法省不煩教化如神法寬刑緩囹圄空虚天下一俗莫懷姦心此聖人之恩也夫上好取而無量即下貪功而無讓民貧苦而分爭生事力勞而無功智詐萌生盜賊滋彰上下相怨號令不行車同軌書同文天下一俗賞不僭刑不潑四海一心能如是則人主之思不出四域而教化如神上好取而無度下貪功而不讓智詐起而民力殘上下相怨天地不交而萬物不通矣夫水濁者魚噞政苛者民亂上多欲即下多詐上煩擾即下不定上多求即下交爭不治其本而救之於末無以異於鑿渠而止水抱薪而救火聖人事省而求治寡而贍不施而仁不言而信不求而得不爲而成懷自然保至眞抱道推誠天下從之如響之應聲影之象形所修者本也天垂象示吉凶人皆見之君布令明賞罰民皆信之君其天矣乎水濁魚噞政苛民亂理所必然是故上多欲則民興詐上好靜則民不爭聖人抱道推誠天下從之可謂知本矣老子曰精神越於外智慮蕩於内者不能治形神之所用者遠則所遺者近故不出於户以知天下不窺於牖以知天道其出彌遠其知彌少此言精誠發於内神氣動於天也天地交而萬物通聖人作而萬物睹自然孚感之道也人心與天通者蓋由賦形受命元自天來是故精誠發於内則神氣動於天人心虚明天光發輝如鏡鑒形妍醜自見心其可不愼乎老子曰冬日之陽夏日之陰萬物歸之而莫之所極自然至精之感弗召而來不去而往窈窈冥冥不知所爲者而功自成待目而照見待言而使命其於治難矣臯陶喑而爲大理天下無虐刑何貴乎言者也師曠瞽而爲大宰晋國無亂政何貴乎見者也不言之令不視之見聖人所以爲師也陽燧召火非日不欿方諸召水非月不流是故有其道無其位則事不立有其位無其道則功不成若唐虞之君臣道合化成教行百官正萬民服聖人所以爲百世之師民之化上不從其言從其所行故人君好勇弗使鬥爭而國家多難其漸必有劫殺之亂矣人君好色弗使風議而國家昏亂其積至於淫泆之難矣故聖人精誠别於内好憎明於外出言以副清發號以明指是故刑罰不足以移風殺戮不足以禁姦唯神化爲貴精至爲神精之所動若春氣之生秋氣之殺故君子者猶射者也於此毫末於彼尋丈矣故理人者愼其所以感之表正景直源清流長本末相資之道也知心爲身本則知君爲民本是故人君之好不可不正好勇則劫殺之亂生好色則淫泆之難超惟好德者精神别於内好憎明於外刑罰不用而奸邪服本根既固國家自寧老子曰縣法設賞而不能移風易俗者誠心不抱也故聽其音則知其風觀其樂即知其俗見其俗即知其化夫抱眞效誠者感動天地神踰方外令行禁止誠通其道而達其意雖無一言天下萬民禽獸鬼神與之變化故太上神化其次使不得爲非其下賞賢而罰暴石藴玉而山輝水含珠而淵媚有諸内形諸外也水石無言人自信之國家懷其仁誠推其信實罰不以怨賞不以私有不待縣法設賞而民將化之故聞伯夷之風者頑夫廉懦夫有立志伯夷何言哉身化之也言而不行民弗從矣老子曰大道無爲無爲即無有無有者不居也不居者即處無形無形者不動不動者無言也無言者即靜而無聲無形無聲者視之不見聽之不聞是謂微妙是謂至神緜緜若存是謂天地之根道無形無聲故聖人强爲之形以一字爲名天地之道大以小爲本多以少爲始天子以天地爲品以萬物爲資功德至大勢名至貴二德之美與天地配故不可不軌大道以爲天下母道天地王域中之四大道無爲故悠乆天無言故高明地無聲故博厚兼而有之王也王乃天之子地之主民之父母惟其愛養萬物不以爲恩故功德至大勢名至貴無得而逾焉老子曰賑窮補急則名生超利除害即功成世無災害雖聖無所施其德上下和陸雖賢無所立其功故至人之治含德抱道推誠樂施無窮之智寢說而不言天下莫之知貴其不言者故道可道非常道也名可名非常名也著於竹帛鏤於金石可傳於人者皆其粗也三皇五帝三王殊事而同心異路而同歸末世之學也不知道之所體一德之所總要取成事之迹跪坐而言之雖博學多聞不免於亂含道抱德推誠樂施處上之道也賑窮補急起利除害處中之道也自得勝求不取勝與處下之道也達其時宜通其變故不拘仩隱異事同功有不假竹帛金石而可與古爲徒老子曰心之精者可以神化而不可說道聖人不降席而匡天下情甚於呼故同言而信信在言前也同令而行誠在令外也聖人在上民化如神情以先之動於上不應於下者情令殊也三月嬰兒未知利害而慈母愛之愈篤者清也故言之用者變變乎小哉不言之用者變變乎大哉信君子之言忠君子之意忠信形於内感動應乎外賢聖之化也黄帝書曰天性人也人心機也君者天地之心乎心乃神明之府情動乎中言發乎外善則千里之外應之不善則千里之外違之是以聖人在上其化如神不降席而匡天下老子曰子之死父臣之死君非出死以求名也恩心藏於中而不違其難也君子之憯怛非正爲也自中出者也亦察其所行聖人不慙於景君子愼其獨也舍近期遠塞矣故聖人在上則民樂其治在下則民慕其意志不忘乎欲利人也士見危授命臨大節而不可奪者忠孝使然也若萇弘之死於君申生之死於父恩心藏於中而不違其難曾何以出死求名爲哉聖人在上民樂其治二帝三王也聖人在下民慕其意玄聖素王也老子曰勇士一呼三軍皆辟其出之誠也倡而不和意而不載中必有不合者也不下席而匡天下者求諸己也故說之所不至者容貌至焉容貌所不至者感忽至焉感乎心發而成形精之至者可以形接不可以照期言出乎口行發乎心誠之動也言出乎邇行發乎遠誠之應也勇士一呼其出之誠三軍其有不避乎若孫子之教戰勇出於誠也斬王愛姬則是吴王言出不誠禍及下也有國家者言行其可不誠乎老子曰言有宗事有本失其宗本技能雖多不如寡言害衆者倕而使斷其指以明大巧之不可爲也故匠人智爲不以能以時閉不知閉也故必杜而後開多言多事聖人所戒惟宗道本德教行不言故無敗也事處無爲故無害也末俗之流技能雖多爲巧所役希不傷手夫大匠之事不以智能故無關楗而不可開杜而後開者扃鐍雖固盜至則發宗本何在哉老子曰聖人之從事也所由異路而同歸存亡定傾若一志不忘乎欲利人也故秦楚燕魏之歌異聲而皆樂九夷八狄之哭異聲而皆哀夫歌者樂之徵哭者哀之效也愔於中發於外故在所以感之矣聖人之心日夜不忘乎欲利人其澤之所及亦遠矣聖人非無欲因其利而利之聖人非無事當其爲而爲之異路同歸存亡一致損已利人不忘天下雖殊方異域俗變風移語音不同性情則一愔於中發於外樂則歌哀則哭隨感而發皆吾民也而可忘乎若周公之夜以繼日坐以待旦則是晝夜不忘者也澤及遠矣老子曰人無爲而治有爲也即傷無爲而治者爲無爲爲者不能無爲也不能無爲者不能有爲也人無言而神有言也即傷無言而神者載無言則傷有神之神者身有形神無形有則有言無則無言知有無之相生則無不害有有不害無是以聖人無爲而治者身不傷神神不傷身也夫知不神所以神故兩不相傷矣文子曰名可强立功可强成昔南榮趎恥聖道而獨亡於己南見老子受教一言精神曉靈屯閉條達辛苦十日不食如享太牢是以明照海内名立後世智絡天地察分秋毫稱譽華語至今不休此謂名可强立也故田者不强囷倉不滿官不厲誠心不精將相不强功烈不成王侯懈怠後世無名至人潜行譬猶雷霆之藏也隨時而舉事因資而立功進退無難無所不通困知强行成功則一若南榮趎斯亦學知利行者乎趎恥聖道而獨亡乎己於是託業于庚桑楚之門異時南見老子得聞衛生之經明照海内名立後世則是名可强立功可强成聖人潜行隨時舉事因資立功進退何難哉夫至人精誠内形德流四方見天下有利也喜而不忘天下有害也怵若有喪夫憂民之憂者民亦憂其憂樂民之樂者民亦樂其樂故憂以天下樂以天下然而不王者未之有也聖人之法始於不可見終於不可及處於不傾之地積於不盡之倉載於不竭之府出令如流水之源使民於不爭之官開必得之門不爲不可成不求不可得不處不可乆不行不可復大人行可說之政而人莫不順其命命順則從小而致大命逆則以善爲害以成爲敗至人聖人大人宜有别矣夫至人視民猶己同乎利害人樂亦樂人憂亦憂未有不王者也聖人之法始不可見終不可及今出如流大人行可說之政順時而出命順則人從逆則民傷夫所謂大丈夫者内强而外明内强如天地外明如日月天地無不覆載日月無不照明大人以善示人不變其故不易其常天下聽令如草從風政失於春歲星盈縮不居其常政失於夏熒惑逆行政失於秋太白不當出入無常政失於冬辰星不效其鄉四時失政鎮星揺蕩日月見謫五星悖亂彗星出春政不失禾黍滋夏政不失雨降時秋政不失民殷昌冬政不失國家康寧人禀天地之靈心乃神明之府大人者則又靈於人者也一念之動若善若惡天必鑒之是故政有得失見於災祥隨事而應罔有差忒書曰慢神虐民皇天弗保有官守者不可愼歟通玄眞經纘義卷之二
