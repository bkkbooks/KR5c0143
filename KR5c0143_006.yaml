front:
  text: 通玄真經纘義卷之六非六
  hash: sha256:4426f1755c158dcaa67d480cddc61d13bddcfc8df25539f5a4b01bbbcf819d9c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0143_HFL_006-001a, image: hfl/0523/0523-186.png}
body:
  text: 南谷子杜道堅纂上德篇老子曰主者國之心也心治即百節皆安心擾即百節皆亂故其身治者支體相遺也其國治者君臣相忘也德一也有二焉長養萬物天之德愛養百姓君之德夫君者國之心君有德則心廣體胖氣不亂而身自治治國猶治身君臣相安國其有不治者乎故曰上德不德則是有德而不自恃以為德是以有德老子學於常樅見舌而守柔仰視屋樹退而目川觀影而知持後故聖人虛無因循常後而不先譬若積薪燎後者處上常樅古之聖人也老子學於常樅猶孔子學於老子目擊道存精神冥契故能見舌而守柔觀影而知持後是以聖人因循虛無不爭强不敢先夫是之謂上德老子曰鳴鐸以聲自毁膏燭以明自煎虎豹之文來射猿狖之捷來格故勇武以强梁死辨士以智能困以智知而未能以智不知故勇於一能察於一辭可與曲說未可與廣應人貴有德不貴多智智多則出乎己而反乎己鮮不自害虎豹之文來射猿狖之捷來格士之勇死於强智困於辨宜矣惟不以智知而以智不知者則不局於一而所應者廣老子曰道以無有為體視之不見其形聽之不聞其聲謂之幽冥幽冥者所以論道而非道也夫道者內視而自反故人不小覺不大迷不小慧不大愚莫鑑於流潦而鑑於止水以其內保之止而不外蕩月望日奪光陰不可以承陽日出星不見不能與之爭光末不可以强于本枝不可以大于幹上重下輕其覆必易一淵不兩蛟一雌不二雄一即定兩即爭玉在山而草木潤珠生淵而岸不枯蚯蚓無筋骨之强爪牙之利上食晞堁下飲黃泉用心一也道以無有為體故可並行物以有形為用故不兩立無有為體一則定矣有形為用兩則爭矣然小大有間君臣有分人君懷道抱德曾不我有此道之所以大德之所以久也天下孰敢以爭强為哉清之為明杯水可見眸子濁之為害河水不見太山蘭芷不為莫服而不芳舟浮江海不為莫乘而沉君子行道不為莫知而止性之有也以清入濁必困辱以濁入清必覆傾天二氣即成虹地二氣即泄藏人二氣即生病陰陽不能常且冬且夏月不知晝日不知夜川廣者魚大山高者木修地廣者德厚故魚不可以無餌釣獸不可以空器召山有猛獸林木為之不斬園有螫蟲葵藿為之不采國有賢臣折衝千里通於道者若車軸轉於轂中不運於己與之致於千里終而復始轉於無窮之原也故舉枉與直何如不得舉直與枉勿與遂往水清鑑影心清鑑物明之故也濁則昏矣君子小人勢不兩立冬寒夏暑時不並行時並行則災癘生勢兩立則禍患作雖然為君子者豈以小人在位道不可行而終不出乎有鳥將來張羅而待之得鳥者羅之一目今為一目之羅則無時得鳥故事或不可前規物或不可預慮故聖人畜道待時也欲致魚者先通谷欲來鳥者先樹木水積而魚聚木茂而鳥集為魚得者非挈而入淵也為猿得者非負而上木也縱之所利而已足所踐者淺然待所不踐而後能行心所知者褊然待所不知而後能明川竭而谷虛丘夷而淵塞唇亡而齒寒河水深而壤在山水靜則清清則平平即易易即見物之形形不可併故可以為正知有用之用不知無用之用不可與言政治國者要在一人非衆人則不能治欲得賢而不先養士可乎是以聖人畜道待時得人則興未有不為我用者也使葉落者風搖之也使水濁者物撓之也璧瑗之器礛儲之功也鏌鎁之斷割砥礪之力也虻與驥致千里而不飛無裹糧之資而不饑狡兔得而獵犬烹高鳥盡而良弓藏名成功遂身退天道然也怒出於不怒為出於不為視於無有則得所見聽於無聲即得所聞飛鳥反鄉兔走歸窟狐死首丘寒螿得木各依其所生也道可獨行事不可以獨擅人健走日不百里而罷得良馬則千里可致怒出於不怒文武所以安天下之民為出於不為堯舜所以成垂衣之治為國家而善用人者民孰不知歸乎水火相憎鼎鬲在其間五味以和骨肉相愛也讒人間之父子相危犬豕不擇器而食愈肥其體故近死鳳凰翔於千仞莫之能致椎固於枘而不能自椓目見百步之外而不能見其眥因高為山即安而不危因下為淵則魚鱉歸焉溝池潦即溢旱即枯河海之源淵深而不竭聾無耳而目不可以蔽精於明也瞽無目而耳不可以蔽精於聽也混混之水濁可以濯吾足乎泠泠之水清可以濯吾纓乎䋤之為縞也或為冠或為冠即戴枝之即足蹍之人無常是物無常非氣順則合氣逆則離火炎上水潤下鼎鬲和之即既濟之功成父王慈子主孝讒人間之即參商之怨起犬豕體肥近於死鳳凰高飛莫能致清斯濯纓濁斯濯足不能潔己而為物污者可不審諸金之勢勝木一刃不能殘一林土之勢勝水一掬不能塞江河水之勢勝火一酌不能救一車之薪冬有雷夏有雹寒暑不變其即霜雪麃麃日出而流傾易覆也倚易軵也幾易助也溼易雨也蘭芷以芳不得見霜蟾蜍辟兵壽在五月之望精泄者中易殘華非其時者不可食生剋制伏固有定分力小任大未有不返受其制者木勝金水勝土火勝水終非其性夫冬雷夏雹終非其時曾不朝夕之久人其可不自量乎舌之於齒孰先弊焉繩之與矢孰先折焉使影曲者形也使響濁者聲也與死同病者難為良醫與亡國同道者不可為忠謀使倡吹竿使工捻竅雖中節不可使决君形亡焉聾者不歌無以自樂盲者不觀無以接物步於林者不得直道行於險者不得履繩海內其所出故能大處非其地依非其人難矣哉齒剛先缺矢徑先折與死同病難於為良醫與亡國同道不可為忠謀君不用道而臣强之謀出二心功可成乎日不並出狐不二雄神龍不匹猛獸不羣鷙鳥不雙蓋非橑不蔽日輪非軸不追疾橑輪未足恃也張弓而射非弦不能發發矢之為射十分之一飢馬在廄漠然無聲投芻其旁爭心乃生三寸之管無當天下不能滿十石而有塞百斗而足循繩而斷即不過縣衡而量即不差縣古法以類有時而遂杖格之屬有時而施是而行之謂之斷非而行之謂之亂日不並出神龍不匹猛獸不羣況於人乎橑以張蓋軸以轉輪君臣相資之道也饑馬爭芻賞不可濫循繩而斷法無過差古法杖格用之以時在乎行之者耳農夫勞而君子養愚者言而智者擇見之明白處之如玉石見之黯黣必留其謀百星之明不如一月之光十牖畢開不如一户之明蝮蛇不可為足虎不可為翼今有六尺之席卧而越之下才不難立而踰之上才不易勢施異也助祭者得嘗救鬭者得傷蔽於不祥之木為雷霆所撲日月欲明浮雲蔽之河水欲清沙土穢之叢蘭欲修秋風敗之人性欲平嗜欲害之蒙塵而欲無眯不可得潔黃金龜紐賢者以為佩土壤布地能者以為富故與弱者金玉不如與之尺素農夫不勞君子無以養君子不治農夫其能安乎蛇無足虎無翼不可兩得浮雲蓋日失不在己嗜欲害性病不在人轂虛而中立三十輻各盡其力使一輻獨入衆輻皆棄何近遠之能至橘柚有鄉萑葦有叢獸同足者相從游鳥同翼者相從翔欲觀九州之地足無千里之行無政教之源而欲為萬民上者難矣凶凶者獲提提者射故大白若辱廣德若不足君子有酒小人鞭缶雖不可好亦可以醜皇極居中資八輔而後建車轂虛中籍衆輻而後行天子中天下而立位萬民之上而無政教之源是猶無千里之足欲觀九州之地其何以行之惟正位端居百官分職不下堂而天下治矣人之性便衣縣帛或射之即被甲為所不便以得其便也三十輻共一轂各直一鑿不得相入猶人臣各守其職也善用人者若蚈之足衆而不相害若舌之與齒堅柔相磨而不相敗石生而堅芷生而方少而有之長而逾明扶之與提謝之與讓得之與失諾之與己相去千里作事有法事無不成用人有方人無不濟車轂之各直一鑿明官事之各有守也蚈足衆而不相害由用得其宜矣石堅芷芳隨其材而用之則賢者明愚者力成功一也再生者不穫華太早者不須霜而落汙其準粉其顙腐鼠在阼燒熏於堂入水而憎濡懷臭而求芳雖善者不能為工冬冰可拆夏木可結時難得而易失木方盛終日采之而復生秋風下霜一夕而零質的張而矢射集林木茂而斧斤入非或召之也形勢之所致乳犬之噬虎伏雞之搏貍恩之所加不量其力夫待利而登溺者必將以利溺之矣舟能浮能沉愚者不知足焉驥驅之不進引之不止人君不以求道里時難得而易失民易困而難蘇故物再生者實不逮穫華太早者落不待霜時不順也的張而矢集林茂而斧入勢之所致乳犬噬虎伏雞搏貍情之所使舟腐而載則沉驥疲而驅則斃民其可重困乎水雖平必有波衡雖正必有差尺雖齊必有危非規矩不能定方圓非準繩無以正曲直用規矩者亦有規矩之心太山之高倍而不見秋毫之末視之可察竹木有火不鑽不熏土中有水不掘不出矢之疾不過二里跬步不休跛鱉千里纍土不止丘山從成臨河欲魚不若歸而織網弓先調而後求徑馬先順而後求良人先信而後求能巧冶不能消木良匠不能斷冰物有不可如之何君子不留意使人無渡河可使河無波不可無曰不辜甑終不墮井矣水平不能無波衡正不能無差心其可不愼諸君子之禮義廉恥猶匠石之規矩準繩也弓先調而後求徑馬先順而後求良人不先之以信能者其可致乎故君子為其所可為而不為其所無奈何刺我行者欲我交呰我貨者欲我市行一棋不足以見知彈一弦不足以為悲今有一炭然掇之爛指相近也萬石俱熏去之十步而不死同氣而異積也有榮華者必有愁悴上有羅紈下必有麻纘木大者根瞿山高者基扶苦語利行苦藥利病刺我行者欲我交君子循義也呰我貨者欲我市小人徇利也人之福不可過服不必侈木大者根瞿山高者基扶民富則國昌矣老子曰鼓不藏聲故能有聲鏡不沒形故能有形金石有聲不動不鳴管簫有音不吹無聲是以聖人內藏不為物唱事來而制物至而應天行不已終冇復始故能長久輪得其所轉故能致遠天行一不差故無過矣天氣下地氣上陰陽交通萬物齊同君子用事小人消亡天地之道也天氣不下地氣不上陰陽不通萬物不昌小人得勢君子消亡五穀不植道德內藏天之道裒多益寡地之道損高益下鬼神之道驕溢與下人之道多者不與聖人之道卑而莫能上也心不藏物故能應物鼓不藏聲故能應聲不扣而鳴則為怪矣是以聖人內藏不為物唱應之而已天地交通萬物齊同此明良會遇而君子用事之時也一或反此則是小人得勢之日矣惟聖人居高聽卑而不自滿無以上之天明日明而後能照四方君明臣明域中乃安域有四明乃能長久明其施明者明其化也天道為文地道為理一為之和時為之使以成萬物命之曰道大道坦坦去身不遠修之於身其德乃真修之於物其德不絶天覆萬物施其德而養之與而不取故精神歸焉與而不取者上德也是以有德高莫高於天也下莫下於澤也天高澤下聖人法之尊卑有叙天下定矣地載萬物而長之與而取之故骨骸歸焉與而取者下德也下德不失德是以無德地承天故定寧地定寧萬物形地廣厚萬物聚定寧無不載廣厚無不容地勢深厚水泉入聚地道方廣故能久長聖人法之德無不容君天道臣地道天尊地卑君臣之分定矣君明臣明照于四方豈非堯之光宅天下百姓昭明者乎故法天效地以成萬物者道也養之與之而不取者上德也與而取之德斯下矣陰難陽萬物昌陽服陰萬物湛物昌無不贍也物湛無不樂也物樂則無不治矣陰害物陽自屈陰進陽退小人得勢君子避害天道然也陽氣動萬物緩而得其所是以聖人順陽道夫順物者物亦順之逆物者物亦逆之故不失物之情性污澤盈萬物節成污澤枯萬物節荂故雨澤不行天下荒亡陽上而復下故為萬物主不長有故能終而復始終而復始故能長久能長久故為天下母陽氣蓄而後能施陰氣積而後能化未有不蓄積而後能化者也故聖人愼所積陽滅陰萬物肥陰滅陽萬物衰故王公尚陽道則萬物昌尚陰道則天下亡陽不下陰萬物不成君不下臣德化不行故君下臣則聰明不下臣則暗聾陽生陰殺故君子好生小人好殺也王公尚陽道則萬物昌尚陰道則天下亡陽貴下陰故君下臣則聰明而國理不下臣則暗聾而德化不行日出於地萬物蕃息王公居民上以明道德日入於地萬物休息小人居民上萬物逃匿雷之動也萬物啓雨之潤也萬物解大人施行有似於此陰陽之動有常節大人之動不極物雷動地萬物緩風搖樹草木敗大人去惡就善民不遠徙故民有去就也去尤甚就少愈風不動火不出大人不言小人無述火之出也必待薪大人之言必有信有信而真何往不成河水深壤在山丘陵高下入淵陽氣盛變為陰陰氣盛變為陽故欲不可盈樂不可極忿無惡言怒無作色是謂計得火上炎水下流聖人之道以類相求聖人偯陽天下和同偯陰天下溺沉天之日其人之君乎日出於地王公居民上萬物蕃息日入於地小人居民上萬物逃匿陰陽之動有常節故歲不亂時大人之動不極物故民不遠徙物極則變欲不可盈陰陽天也治亂則關乎人老子曰積薄成厚積卑成高君子日汲汲以成輝小人日快快以至辱其消息也雖未能見故見善如不及宿不善如不祥苟向善雖過無怨苟不向善雖忠來惡故怨人不如自怨勉求諸人不如求諸己聲自召也類自求也名自命也人自官也無非己者操鋭以刺操刃以擊何怨於人故君子愼其微萬物負陰而抱陽冲氣以為和和居中央是以木實生於心草實生於莢卵胎生於中央不卵不胎生而須時地平則水不流輕重均則衡不傾物之生化也有感以然陰陽感而成中和故萬物生君臣合而得中道故萬姓寧是以君子和其心志日汲汲以成輝小人汨其天和日快快以至辱故君子愼微正諸心而自求諸己我不怨人人亦無怨焉老子曰山致其高而雲雨起焉水致其深而蛟龍生焉君子致其道而德澤流焉夫有陰德者必有陽報有隱行者必有昭名樹黍者不穫稷樹怨者無報德為善而人不知謂之至善為惡而人不知謂之至惡山藏雲而成雨露澤藏水而生蛟龍君子懷其道而澤流於世俗有陰德者必有陽報天祐之也有隱行者必有昭名人推之也惟有天德者知之通玄真經纘義卷之六
